[package]
name = "plant-test-consensus"
version = "0.0.0-dev"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true }
finality-grandpa = { workspace = true, default-features = true }
plant-authorship = { workspace = true, default-features = true }
plant-babe = { workspace = true, default-features = true }
plant-balances = { workspace = true, default-features = true }
plant-election-provider = { workspace = true, default-features = true }
plant-grandpa = { workspace = true, default-features = true }
plant-im-online = { workspace = true, default-features = true }
plant-offences = { workspace = true, default-features = true }
plant-session = { workspace = true, default-features = true }
plant-staking = { workspace = true, default-features = true }
plant-staking-macros = { workspace = true, default-features = true }
plant-timestamp = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
topsoil-benchmarking = { workspace = true, default-features = true }
topsoil-core = { workspace = true, default-features = true }

[features]
runtime-benchmarks = [
	"plant-babe/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-grandpa/runtime-benchmarks",
	"plant-offences/runtime-benchmarks",
	"plant-session/runtime-benchmarks",
	"plant-staking/runtime-benchmarks",
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-core/runtime-benchmarks",
]
