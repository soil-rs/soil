[package]
name = "soil-test-node-runtime"
version = "0.0.0-dev"
authors.workspace = true
edition.workspace = true
build = "build.rs"
license.workspace = true
homepage.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-executive = { workspace = true }
plant-metadata-hash-extension = { workspace = true }
topsoil-core = { workspace = true }
topsoil-core-rpc-runtime-api = { workspace = true }
plant-babe = { workspace = true }
plant-balances = { workspace = true }
plant-timestamp = { workspace = true }
plant-utility = { workspace = true }
soil-service = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil-crypto-hashing = { workspace = true }
subsoil-macros = { workspace = true }
soil-statement-store = { workspace = true }
subsoil = { features = ["serde"], workspace = true }
trie-db = { workspace = true }

# 3rd party
array-bytes = { optional = true, workspace = true, default-features = true }
log = { workspace = true }
serde_json = { workspace = true, features = ["alloc"] }
tracing = { workspace = true, default-features = false }

[dev-dependencies]
futures = { workspace = true }
pretty_assertions = { workspace = true }
soil-chain-spec = { workspace = true, default-features = true }
serde = { features = ["alloc", "derive"], workspace = true }
soil-client = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
soil-test-node-runtime-client = { workspace = true }

[build-dependencies]
substrate-wasm-builder = { optional = true, features = ["metadata-hash"], workspace = true, default-features = true }

[features]
default = ["std"]

std = [
	"array-bytes",
	"codec/std",
	"topsoil-executive/std",
	"plant-metadata-hash-extension/std",
	"topsoil-core/std",
	"topsoil-core-rpc-runtime-api/std",
	"log/std",
	"plant-babe/std",
	"plant-balances/std",
	"plant-timestamp/std",
	"plant-utility/std",
	"soil-service",
	"scale-info/std",
	"serde/std",
	"serde_json/std",
	"subsoil/std",
	"subsoil-crypto-hashing/std",
	"soil-statement-store/std",
	"substrate-wasm-builder",
	"tracing/std",
	"trie-db/std"]

# Special feature to disable logging
disable-logging = ["subsoil/disable-logging"]

# This feature adds BLS crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bls-experimental = ["subsoil/bls-experimental"]
