[package]
name = "soil-test"
version = "0.0.0-dev"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "api_bench"
harness = false

[dependencies]
array-bytes = { workspace = true, default-features = true }
async-channel = { workspace = true }
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
fdlimit = { workspace = true }
futures = { workspace = true }
futures-timer = { workspace = true }
libp2p = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { workspace = true, optional = true }
soil-client = { workspace = true, features = ["test-helpers"], default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-service = { workspace = true, default-features = true }
soil-test-runtime-interface-wasm = { workspace = true }
soil-test-runtime-interface-wasm-deprecated = { workspace = true }
subsoil = { workspace = true, default-features = true }
tempfile = { workspace = true }
tokio = { workspace = true, default-features = true }
tracing = { workspace = true, default-features = true }
tracing-core = { workspace = true, default-features = true }
soil-rpc = { workspace = true, features = ["test-helpers"], default-features = true }
soil-test-node-runtime = { workspace = true }
soil-test-node-runtime-client = { workspace = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
subsoil-macros = { workspace = true }
wat = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
criterion = { workspace = true, default-features = true }
jsonrpsee = { workspace = true }
rustversion = { workspace = true }
serde_json = { workspace = true, default-features = true }
static_assertions = { workspace = true, default-features = true }
trybuild = { workspace = true }

[features]
default = ["serde"]
bls-experimental = ["soil-test-node-runtime-client/bls-experimental"]
disable-ui-tests = []
enable-staging-api = []
serde = ["dep:serde", "subsoil/serde"]
