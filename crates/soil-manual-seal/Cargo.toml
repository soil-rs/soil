[package]
name = "soil-manual-seal"
version = "0.35.0"
authors.workspace = true
description = "Manual sealing engine for Substrate"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }
async-trait = { workspace = true, optional = true}
codec = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
futures-timer = { workspace = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-consensus = { workspace = true, default-features = true, optional = true}
sc-consensus-aura = { workspace = true, default-features = true, optional = true}
sc-consensus-babe = { workspace = true, default-features = true, optional = true}
soil-consensus-epochs = { workspace = true, default-features = true, optional = true}
sc-transaction-pool = { workspace = true, default-features = true, optional = true}
soil-transaction-pool-api = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
soil-client = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"async-trait",
	"codec",
	"futures",
	"futures-timer",
	"jsonrpsee",
	"log",
	"prometheus-endpoint",
	"sc-consensus",
	"sc-consensus-aura",
	"sc-consensus-babe",
	"sc-transaction-pool",
	"serde",
	"soil-client-api",
	"soil-client",
	"soil-consensus-epochs",
	"soil-transaction-pool-api",
	"thiserror",
	"subsoil/std"]

[dev-dependencies]
assert_matches = { workspace = true }
soil-basic-authorship = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
substrate-test-runtime-transaction-pool = { workspace = true }
tokio = { features = ["macros", "rt-multi-thread"], workspace = true, default-features = true }
