[package]
name = "substrate-state-trie-migration-rpc"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Node-specific RPC methods for interaction with state trie migration."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
serde = { features = ["derive"], workspace = true, default-features = true }

subsoil = { workspace = true, default-features = true }
trie-db = { workspace = true, default-features = true }

jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true }

# Substrate Dependencies
soil-client-api = { workspace = true, default-features = true }
soil-rpc-api = { workspace = true, default-features = true }
