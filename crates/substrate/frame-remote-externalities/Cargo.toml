[package]
name = "frame-remote-externalities"
version = "0.35.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "An externalities provided environment that can load itself from remote nodes or cached files"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true }
futures = { workspace = true }
indicatif = { workspace = true }
jsonrpsee = { features = ["http-client", "ws-client"], workspace = true }
log = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
serde = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
soil-state-machine = { workspace = true, default-features = true }
spinners = { workspace = true }
substrate-rpc-client = { workspace = true, default-features = true }
tokio = { features = [
	"macros",
	"rt-multi-thread",
	"sync",
], workspace = true, default-features = true }

[dev-dependencies]
topsoil-support = { workspace = true, default-features = true }
jsonrpsee = { features = [
	"http-client",
	"server",
	"ws-client",
], workspace = true }
soil-tracing = { workspace = true, default-features = true }

[features]
remote-test = []
