[package]
name = "staging-node-inspect"
version = "0.12.0"
authors.workspace = true
description = "Substrate node block inspection tool."
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
clap = { features = ["derive"], workspace = true }
codec = { workspace = true, default-features = true }
soil-cli = { workspace = true }
soil-client-api = { workspace = true, default-features = true }
soil-service = { workspace = true }
soil-blockchain = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
soil-statement-store = { workspace = true, default-features = true }
thiserror = { workspace = true }

[features]
runtime-benchmarks = [
	"soil-service/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
