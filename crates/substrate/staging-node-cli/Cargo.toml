[package]
name = "staging-node-cli"
version = "3.0.0-dev"
authors.workspace = true
description = "Generic Substrate node implementation in Rust."
build = "build.rs"
edition.workspace = true
license.workspace = true
default-run = "substrate-node"
homepage.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[package.metadata.wasm-pack.profile.release]
# `wasm-opt` has some problems on linux, see
# https://github.com/rustwasm/wasm-pack/issues/781 etc.
wasm-opt = false

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[badges]
maintenance = { status = "actively-developed" }
is-it-maintained-issue-resolution = { repository = "bitarray/soil" }
is-it-maintained-open-issues = { repository = "bitarray/soil" }

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "substrate-node"
path = "bin/main.rs"
required-features = ["cli"]

[[bench]]
name = "transaction_pool"
harness = false

[[bench]]
name = "block_production"
harness = false

[[bench]]
name = "executor"
harness = false

[dependencies]
subsoil = { workspace = true }
# third-party dependencies
array-bytes = { workspace = true, default-features = true }
clap = { features = ["derive"], optional = true, workspace = true }
codec = { workspace = true, default-features = true }
futures = { workspace = true }
jsonrpsee = { features = ["server"], workspace = true }
log = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
subxt-signer = { workspace = true, features = ["unstable-eth"] }

# Substrate dependencies (formerly via polkadot-sdk umbrella):
topsoil-metadata-hash-extension = { workspace = true, default-features = true }
topsoil-system = { workspace = true, default-features = true }
topsoil-system-rpc-runtime-api = { workspace = true, default-features = true }
fork-tree = { workspace = true, default-features = true }
remote-externalities = { workspace = true, default-features = true }
topsoil-support-procedural-tools = { workspace = true, default-features = true }
generate-bags = { workspace = true, default-features = true }
soil-mmr-gadget = { workspace = true, default-features = true }
soil-mmr-rpc = { workspace = true, default-features = true }
topsoil-asset-conversion-tx-payment = { workspace = true, default-features = true }
topsoil-im-online = { workspace = true, default-features = true }
topsoil-transaction-payment-rpc = { workspace = true, default-features = true }
sc-authority-discovery = { workspace = true, default-features = true }
soil-basic-authorship = { workspace = true, default-features = true }
soil-chain-spec = { workspace = true, default-features = true }
soil-cli = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-aura = { workspace = true, default-features = true }
soil-babe = { workspace = true, default-features = true }
soil-beefy = { workspace = true, default-features = true }
soil-grandpa = { workspace = true, default-features = true }
soil-manual-seal = { workspace = true, default-features = true }
soil-pow = { workspace = true, default-features = true }
soil-informant = { workspace = true, default-features = true }
sc-mixnet = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
sc-offchain = { workspace = true, default-features = true }
soil-proposer-metrics = { workspace = true, default-features = true }
sc-rpc = { workspace = true, default-features = true }
soil-rpc-api = { workspace = true, default-features = true }
soil-rpc-server = { workspace = true, default-features = true }
soil-rpc-spec-v2 = { workspace = true, default-features = true }
soil-service = { workspace = true, default-features = true }
soil-sync-state-rpc = { workspace = true, default-features = true }
soil-sysinfo = { workspace = true, default-features = true }
soil-telemetry = { workspace = true, default-features = true }
sc-transaction-pool = { workspace = true, default-features = true }
soil-authority-discovery = { workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
soil-genesis-builder = { workspace = true, default-features = true }
soil-rpc = { workspace = true, default-features = true }
soil-statement-store = { workspace = true, default-features = true }
soil-transaction-storage-proof = { workspace = true, default-features = true }
chain-spec-builder = { workspace = true, default-features = true }
node-inspect = { optional = true, workspace = true, default-features = true }
subkey = { workspace = true, default-features = true }
substrate-build-script-utils = { workspace = true, default-features = true }
substrate-frame-rpc-support = { workspace = true, default-features = true }
substrate-frame-rpc-system = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
substrate-rpc-client = { workspace = true, default-features = true }
substrate-state-trie-migration-rpc = { workspace = true, default-features = true }
substrate-wasm-builder = { workspace = true, default-features = true }
# Shared code between the staging node and kitchensink runtime:
kitchensink-runtime = { workspace = true }
node-primitives = { workspace = true, default-features = true }
node-rpc = { workspace = true }
[dev-dependencies]
assert_cmd = { workspace = true }
topsoil-support = { workspace = true, default-features = true }
topsoil-bags-list = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-root-testing = { workspace = true, default-features = true }
topsoil-sudo = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
topsoil-transaction-payment = { workspace = true, default-features = true }
topsoil-treasury = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
criterion = { features = ["async_tokio"], workspace = true, default-features = true }
nix = { features = ["signal"], workspace = true }
pretty_assertions.workspace = true
regex = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true, default-features = true }
soketto = { workspace = true }
tempfile = { workspace = true }
tokio = { features = ["macros", "parking_lot", "time"], workspace = true, default-features = true }
tokio-util = { features = ["compat"], workspace = true }
wat = { workspace = true }

# These testing-only dependencies are not exported by the Polkadot-SDK crate:
node-testing = { workspace = true }
soil-service-test = { workspace = true }
substrate-cli-test-utils = { workspace = true }
[build-dependencies]
clap = { optional = true, workspace = true }
clap_complete = { optional = true, workspace = true }

node-inspect = { optional = true, workspace = true, default-features = true }

soil-cli = { optional = true, workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
substrate-build-script-utils = { optional = true, workspace = true, default-features = true }

[features]
default = ["cli"]
cli = [
	"clap",
	"clap_complete",
	"node-inspect",
	"dep:soil-cli",
	"dep:substrate-build-script-utils"]
runtime-benchmarks = [
	"kitchensink-runtime/runtime-benchmarks",
	"node-inspect?/runtime-benchmarks",
	"soil-client/runtime-benchmarks",
	"soil-service/runtime-benchmarks"]
try-runtime = [
	"kitchensink-runtime/try-runtime",
	"substrate-cli-test-utils/try-runtime"]
