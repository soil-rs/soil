[package]
name = "substrate-test-runtime"
version = "2.0.0"
authors.workspace = true
edition.workspace = true
build = "build.rs"
license.workspace = true
homepage.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-executive = { workspace = true }
topsoil-metadata-hash-extension = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
topsoil-system-rpc-runtime-api = { workspace = true }
topsoil-babe = { workspace = true }
topsoil-balances = { workspace = true }
topsoil-timestamp = { workspace = true }
topsoil-utility = { workspace = true }
soil-service = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-application-crypto = { features = ["serde"], workspace = true }
soil-block-builder = { workspace = true }
soil-consensus-aura = { features = ["serde"], workspace = true }
soil-consensus-babe = { features = ["serde"], workspace = true }
soil-consensus-grandpa = { features = ["serde"], workspace = true }
subsoil-crypto-hashing = { workspace = true }
subsoil-debug-derive = { workspace = true, default-features = false }
soil-genesis-builder = { workspace = true }
soil-inherents = { workspace = true }
soil-io = { workspace = true }
soil-keyring = { workspace = true }
soil-offchain = { workspace = true }
soil-runtime = { features = ["serde"], workspace = true }
soil-session = { workspace = true }
soil-state-machine = { workspace = true }
soil-statement-store = { workspace = true }
soil-transaction-pool = { workspace = true }
soil-version = { workspace = true }
trie-db = { workspace = true }

# 3rd party
array-bytes = { optional = true, workspace = true, default-features = true }
log = { workspace = true }
serde_json = { workspace = true, features = ["alloc"] }
tracing = { workspace = true, default-features = false }

[dev-dependencies]
futures = { workspace = true }
pretty_assertions = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
soil-chain-spec = { workspace = true, default-features = true }
soil-executor = { workspace = true, default-features = true }
soil-executor-common = { workspace = true, default-features = true }
serde = { features = ["alloc", "derive"], workspace = true }
soil-consensus = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }

[build-dependencies]
substrate-wasm-builder = { optional = true, features = ["metadata-hash"], workspace = true, default-features = true }

[features]
default = ["std"]

std = [
	"array-bytes",
	"codec/std",
	"topsoil-executive/std",
	"topsoil-metadata-hash-extension/std",
	"topsoil-support/std",
	"topsoil-system-rpc-runtime-api/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-babe/std",
	"topsoil-balances/std",
	"topsoil-timestamp/std",
	"topsoil-utility/std",
	"soil-executor/std",
	"soil-service",
	"scale-info/std",
	"serde/std",
	"serde_json/std",
	"soil-api/std",
	"soil-application-crypto/std",
	"soil-block-builder/std",
	"soil-consensus-aura/std",
	"soil-consensus-babe/std",
	"soil-consensus-grandpa/std",
	"subsoil/std",
	"subsoil-crypto-hashing/std",
	"subsoil-debug-derive/std",
	"soil-genesis-builder/std",
	"soil-inherents/std",
	"soil-io/std",
	"soil-keyring/std",
	"soil-offchain/std",
	"soil-runtime/std",
	"soil-session/std",
	"soil-state-machine/std",
	"soil-statement-store/std",
	"soil-transaction-pool/std",
	"soil-version/std",
	"substrate-wasm-builder",
	"tracing/std",
	"trie-db/std",
]

# Special feature to disable logging
disable-logging = ["soil-api/disable-logging"]

# This feature adds BLS crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bls-experimental = ["soil-application-crypto/bls-experimental"]
