[package]
description = "Substrate offchain workers"
name = "sc-offchain"
version = "29.0.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
soil-client = { workspace = true, default-features = true }
bytes = { workspace = true, default-features = true }
codec = { features = ["derive"], workspace = true, default-features = true }
fnv = { workspace = true }
futures = { workspace = true }
futures-timer = { workspace = true }
http-body-util = { workspace = true }
hyper = { features = ["http1", "http2"], workspace = true, default-features = true }
hyper-rustls = { workspace = true }
hyper-util = { features = ["client-legacy", "http1", "http2"], workspace = true }
num_cpus = { workspace = true }
once_cell = { workspace = true }
parking_lot = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
rustls = { workspace = true }
soil-client-api = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-network-types = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
soil-offchain = { workspace = true, default-features = true }
subsoil = { workspace = true }
threadpool = { workspace = true }
tracing = { workspace = true, default-features = true }

[dev-dependencies]
async-trait = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
soil-client-db = { default-features = true, workspace = true }
sc-transaction-pool = { workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"subsoil/std",
]
