[package]
name = "sc-consensus-aura"
version = "0.34.0"
authors.workspace = true
description = "Aura consensus algorithm for substrate"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
fork-tree = { workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-telemetry = { workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
subsoil = { workspace = true }
thiserror = { workspace = true }

[dev-dependencies]
soil-network = { workspace = true, default-features = true }
soil-network-test = { workspace = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }
tokio = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"subsoil/std",
]
