[package]
name = "sc-consensus-beefy"
version = "13.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "BEEFY Client gadget for substrate"
homepage.workspace = true

[lints]
workspace = true

[dependencies]
array-bytes = { workspace = true, default-features = true }
async-channel = { workspace = true }
async-trait = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
sc-consensus = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-network-gossip = { workspace = true, default-features = true }
soil-network-sync = { workspace = true, default-features = true }
soil-network-types = { workspace = true, default-features = true }
soil-utils = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-consensus-beefy = { workspace = true, default-features = true }
subsoil = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, default-features = true }
wasm-timer = { workspace = true }

[dev-dependencies]
sc-block-builder = { workspace = true, default-features = true }
soil-network-test = { workspace = true }
serde = { workspace = true, default-features = true }
soil-mmr-primitives = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }

[features]
# This feature adds BLS crypto primitives. It should not be used in production since
# the BLS implementation and interface may still be subject to significant change.
std = [
	"subsoil/std",
]
bls-experimental = [
	"subsoil/bls-experimental",
	"soil-consensus-beefy/bls-experimental",
	"subsoil/bls-experimental"]
