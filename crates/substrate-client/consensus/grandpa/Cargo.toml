[package]
name = "sc-consensus-grandpa"
version = "0.19.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Integration of the GRANDPA finality gadget into substrate."
documentation = "https://docs.rs/sc-consensus-grandpa"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
ahash = { workspace = true }
array-bytes = { workspace = true, default-features = true }
async-trait = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
dyn-clone = { workspace = true }
finality-grandpa = { features = ["derive-codec"], workspace = true, default-features = true }
fork-tree = { workspace = true, default-features = true }
futures = { workspace = true }
futures-timer = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
sc-block-builder = { workspace = true, default-features = true }
soil-chain-spec = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
soil-client-db = { workspace = true, default-features = true }
sc-consensus = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-network-common = { workspace = true, default-features = true }
soil-network-gossip = { workspace = true, default-features = true }
soil-network-sync = { workspace = true, default-features = true }
soil-network-types = { workspace = true, default-features = true }
soil-telemetry = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
subsoil = { workspace = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
thiserror = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
finality-grandpa = { features = ["derive-codec", "test-helpers"], workspace = true, default-features = true }
soil-network-test = { workspace = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"subsoil/std",
]
