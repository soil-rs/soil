[package]
name = "sc-consensus-babe"
version = "0.34.0"
authors.workspace = true
description = "BABE consensus algorithm for substrate"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/sc-consensus-babe"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
fork-tree = { workspace = true, default-features = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
num-bigint = { workspace = true }
num-rational = { workspace = true }
num-traits = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
sc-consensus = { workspace = true, default-features = true }
soil-consensus-epochs = { workspace = true, default-features = true }
sc-consensus-slots = { workspace = true, default-features = true }
soil-telemetry = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-application-crypto = { workspace = true, default-features = true }
soil-block-builder = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-consensus-babe = { workspace = true, default-features = true }
soil-consensus-slots = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
soil-inherents = { workspace = true, default-features = true }
soil-keystore = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
soil-timestamp = { workspace = true, default-features = true }
thiserror = { workspace = true }

[dev-dependencies]
sc-block-builder = { workspace = true, default-features = true }
soil-network-test = { workspace = true }
soil-keyring = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }
