soil-rpc = { workspace = true, default-features = true }
soil-session = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-statement-store = { workspace = true, default-features = true }
tokio = { workspace = true, default-features = true }

[dev-dependencies]
assert_matches = { workspace = true }
futures-timer = { workspace = true }
