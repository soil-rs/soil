[package]
name = "sc-transaction-pool"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate transaction pool implementation."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "basics"
harness = false

[dependencies]
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
futures = { workspace = true }
futures-timer = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
linked-hash-map = { workspace = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
soil-utils = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
soil-transaction-pool = { workspace = true, default-features = true }
strum = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true, default-features = true, features = ["macros", "time"] }
tokio-stream = { workspace = true }
tracing = { workspace = true, default-features = true }

[dev-dependencies]
anyhow = { workspace = true }
assert_matches = { workspace = true }
chrono = { workspace = true }
criterion = { workspace = true, default-features = true }
env_logger = { workspace = true }
rstest = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
serde = { workspace = true }
serde_json = { workspace = true }
soil-client = { workspace = true, default-features = true }
substrate-test-runtime = { workspace = true }
substrate-test-runtime-client = { workspace = true }
substrate-test-runtime-transaction-pool = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tracing-subscriber = { workspace = true }
