[package]
name = "sc-tracing"
version = "28.0.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Instrumentation implementation for substrate."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[[bench]]
name = "interest_cache_realistic"
harness = false

[[bench]]
name = "interest_cache_diverse"
harness = false

[[bench]]
name = "interest_cache_multithreaded"
harness = false

[dependencies]
chrono = { workspace = true }
codec = { workspace = true, default-features = true }
console = { workspace = true }
is-terminal = { workspace = true }
libc = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
rustc-hash = { workspace = true }
soil-client-api = { workspace = true, default-features = true }
subsoil-tracing-proc-macro = { workspace = true, default-features = true }
serde = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-rpc = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
thiserror = { workspace = true }
tracing = { workspace = true, default-features = true }
tracing-log = { workspace = true, features = ["interest-cache"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "parking_lot"] }

[dev-dependencies]
criterion = { workspace = true, default-features = true }
regex = { workspace = true }
tracing-subscriber = { workspace = true, features = ["chrono", "parking_lot"] }
