[package]
name = "soil-consensus"
version = "0.33.0"
authors.workspace = true
edition.workspace = true
build = "build.rs"
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Collection of common consensus specific implementations for Substrate (client)"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
fork-tree = { workspace = true, default-features = true }
futures = { features = ["thread-pool"], workspace = true }
futures-timer = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
thiserror = { workspace = true }
soil-telemetry = { workspace = true, default-features = true }

[dev-dependencies]
soil-test-primitives = { workspace = true }
substrate-test-runtime-client = { workspace = true }
