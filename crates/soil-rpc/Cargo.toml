[package]
name = "soil-rpc"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate RPC primitives and utilities."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
array-bytes = { workspace = true, default-features = true }
async-channel = { workspace = true }
codec = { workspace = true, default-features = true }
dyn-clone = { workspace = true }
forwarded-header-value = { workspace = true }
futures = { workspace = true }
futures-util = { workspace = true }
governor = { workspace = true }
hex = { workspace = true, default-features = true }
http = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true }
ip_network = { workspace = true }
itertools = { workspace = true }
jsonrpsee = { features = ["client-core", "macros", "server", "server-core", "ws-client"], workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
schnellru = { workspace = true }
serde = { features = ["derive"], workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
soil-chain-spec = { workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-statement-store = { features = ["serde"], workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
thiserror = { workspace = true }
tokio = { workspace = true, default-features = true }
tokio-stream = { features = ["sync"], workspace = true }
tower = { workspace = true, features = ["util"] }
tower-http = { workspace = true, features = ["cors"] }
trie-db = { workspace = true, default-features = true }

[dev-dependencies]
assert_matches = { workspace = true }
async-trait = { workspace = true }
futures-timer = { workspace = true }
jsonrpsee = { workspace = true, features = ["server", "ws-client"] }
pretty_assertions = { workspace = true }
soil-txpool = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
soil-service = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
soil-test-node-runtime = { workspace = true }
soil-test-node-runtime-client = { workspace = true }
soil-test-node-runtime-txpool = { workspace = true }
tempfile = { workspace = true }

[features]
test-helpers = []
