[package]
name = "soil-client"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate client libraries"

[[bench]]
name = "bench"
harness = false

[[bench]]
name = "interest_cache_realistic"
harness = false

[[bench]]
name = "interest_cache_diverse"
harness = false

[[bench]]
name = "interest_cache_multithreaded"
harness = false

[lints]
workspace = true

[dependencies]
subsoil = { features = ["wasm-interface-wasmtime"], workspace = true, default-features = true }
# consensus deps
async-trait = { workspace = true }
futures = { features = ["thread-pool"], workspace = true }
log = { workspace = true, default-features = true }
thiserror = { workspace = true }
mockall = { workspace = true }
# storage-monitor deps
clap = { features = ["derive", "string"], workspace = true }
fs4 = { workspace = true }
tokio = { features = ["time"], workspace = true, default-features = true }
# utils deps
async-channel = { workspace = true }
futures-timer = { workspace = true }
parking_lot = { workspace = true, default-features = true }
prometheus = { workspace = true }
# maybe-compressed-blob deps
zstd = { workspace = true }
# state-db deps
codec = { features = ["derive"], workspace = true, default-features = true }
# blockchain deps
schnellru = { workspace = true }
tracing = { workspace = true, default-features = true }
# transaction_pool deps
indexmap = { workspace = true }
serde = { features = ["derive"], workspace = true, default-features = true }
strum = { workspace = true, features = ["derive"] }
# executor-common deps
polkavm = { workspace = true }
wasm-instrument = { workspace = true, default-features = true }
# executor-wasmtime deps
anyhow = { workspace = true }
wasmtime = { features = [
	"addr2line",
	"cache",
	"cranelift",
	"demangle",
	"gc",
	"gc-null",
	"parallel-compilation",
	"pooling-allocator",
	"profiling",
	"threads",
], workspace = true }
rustix = { features = ["fs", "mm", "param", "std", "use-libc"], workspace = true }
# client-api deps
fnv = { workspace = true }
prometheus-endpoint = { workspace = true, default-features = true }
# client-db deps
hash-db = { workspace = true, default-features = true }
kvdb = { workspace = true }
kvdb-memorydb = { workspace = true }
kvdb-rocksdb = { optional = true, workspace = true }
linked-hash-map = { workspace = true }
parity-db = { workspace = true }
sysinfo = { workspace = true }
# tracing deps
chrono = { workspace = true }
console = { workspace = true }
is-terminal = { workspace = true }
libc = { workspace = true }
rustc-hash = { workspace = true }
subsoil-derive = { workspace = true }
tracing-log = { workspace = true, features = ["interest-cache"] }
tracing-subscriber = { workspace = true, features = ["env-filter", "parking_lot"] }
# keystore deps
array-bytes = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }

[dev-dependencies]
futures = { workspace = true }
tokio = { features = ["macros"], workspace = true, default-features = true }
# executor-wasmtime test deps
cargo_metadata = { workspace = true }
paste = { workspace = true, default-features = true }
tempfile = { workspace = true }
wat = { workspace = true }
# executor test deps
assert_matches = { workspace = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
tracing-subscriber = { workspace = true, features = ["chrono", "parking_lot"] }
# client-db test deps
criterion = { workspace = true, default-features = true }
kvdb-rocksdb = { workspace = true }
rand = { workspace = true, default-features = true }
# tracing test deps
regex = { workspace = true }
# utils test deps
tokio-test = { workspace = true }

[features]
# This crate does not have `no_std` support, we just require this for tests
wasm-extern-trace = []
test-helpers = []
runtime-benchmarks = [
	"subsoil/runtime-benchmarks",
]
rocksdb = ["kvdb-rocksdb", "subsoil/rocksdb"]
jemalloc-allocator = ["kvdb-rocksdb?/jemalloc"]
# Keystore features
bls-experimental = ["subsoil/bls-experimental"]
bandersnatch-experimental = ["subsoil/bandersnatch-experimental"]
