[package]
name = "soil-test-fuzz"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Workspace fuzz harnesses for Soil crates."
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bin]]
name = "core_address_uri"
path = "src/core_address_uri.rs"

[[bin]]
name = "npos_reduce"
path = "src/npos_reduce.rs"

[[bin]]
name = "npos_phragmen_balancing"
path = "src/npos_phragmen_balancing.rs"

[[bin]]
name = "npos_phragmms_balancing"
path = "src/npos_phragmms_balancing.rs"

[[bin]]
name = "npos_phragmen_pjr"
path = "src/npos_phragmen_pjr.rs"

[dependencies]
clap = { features = ["derive"], workspace = true }
honggfuzz = { workspace = true }
rand = { features = ["small_rng", "std"], workspace = true, default-features = true }
regex = { workspace = true }
subsoil = { workspace = true, default-features = true }
