[package]
name = "subsoil"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate primitives foundation crate"

[lints]
workspace = true

[dependencies]
subsoil-crypto-hashing = { workspace = true }
backtrace = { optional = true, workspace = true }
regex = { optional = true, workspace = true }
anyhow = { optional = true, workspace = true }
codec = { features = ["derive"], workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { optional = true, workspace = true, default-features = true }
wasmtime = { optional = true, workspace = true }

[features]
default = ["std"]
std = [
	"subsoil-crypto-hashing/std",
	"backtrace",
	"regex",
	"anyhow?/std",
	"codec/std",
	"log/std",
]
wasm-interface-wasmtime = ["anyhow", "dep:wasmtime"]
