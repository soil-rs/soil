[package]
name = "subsoil"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate primitives foundation crate"
build = "build.rs"

[lints]
workspace = true

[dependencies]
async-trait = { optional = true, workspace = true }
subsoil-crypto-hashing = { workspace = true }
backtrace = { optional = true, workspace = true }
regex = { optional = true, workspace = true }
anyhow = { optional = true, workspace = true }
arbitrary = { features = ["derive"], optional = true, workspace = true }
bytes = { workspace = true }
codec = { features = ["derive", "max-encoded-len", "bytes"], workspace = true }
docify = { workspace = true }
environmental = { workspace = true }
integer-sqrt = { workspace = true }
num-traits = { workspace = true }
frame-metadata = { features = ["current"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
static_assertions = { workspace = true, default-features = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true, default-features = true }
kvdb = { optional = true, workspace = true }
kvdb-rocksdb = { optional = true, workspace = true }
parking_lot = { optional = true, workspace = true, default-features = true }
tracing = { workspace = true, features = ["log"] }
tracing-core = { workspace = true }
tracing-subscriber = { workspace = true, optional = true, features = [
	"env-filter",
	"time",
	"tracing-log",
] }
array-bytes = { workspace = true, default-features = true }
hash-db = { workspace = true }
impl-serde = { optional = true, workspace = true }
ref-cast = { workspace = true }
subsoil-derive = { workspace = true }
bounded-collections = { workspace = true, features = ["scale-codec"] }
schemars = { optional = true, workspace = true }
smallvec = { workspace = true, default-features = true }
wasmtime = { optional = true, workspace = true }
parity-wasm = { optional = true, workspace = true }

# Dependencies from soil-runtime
either = { workspace = true }
strum = { workspace = true, features = ["derive"] }
simple-mermaid = { workspace = true, optional = true }
tuplex = { workspace = true, default-features = false }

# Dependencies from soil-core
bip39 = { workspace = true, default-features = false, features = ["alloc"] }
bitflags = { workspace = true }
bs58 = { optional = true, workspace = true }
futures = { optional = true, workspace = true }
hash256-std-hasher = { workspace = true }
itertools = { optional = true, workspace = true }
paste = { workspace = true, default-features = true }
primitive-types = { features = ["codec", "scale-info"], workspace = true }
rand = { features = ["small_rng"], optional = true, workspace = true, default-features = true }
secrecy = { features = ["alloc"], workspace = true }
ss58-registry = { workspace = true }
substrate-bip39 = { workspace = true }
thiserror = { optional = true, workspace = true }
zeroize = { workspace = true }

# full crypto
blake2 = { optional = true, workspace = true }
ed25519-zebra = { workspace = true }
libsecp256k1 = { features = ["static-context"], workspace = true }
merlin = { workspace = true }
schnorrkel = { features = ["preaudit_deprecated"], workspace = true }
k256 = { features = ["alloc", "ecdsa"], workspace = true }
secp256k1 = { features = ["alloc", "recovery"], optional = true, workspace = true }

# Dependencies from soil-trie
ahash = { optional = true, workspace = true }
foldhash = { workspace = true }
hashbrown = { workspace = true }
memory-db = { workspace = true }
nohash-hasher = { optional = true, workspace = true }
prometheus-endpoint = { optional = true, workspace = true, default-features = true }
schnellru = { optional = true, workspace = true }
trie-db = { workspace = true }
trie-root = { workspace = true }

# bls crypto
sha2 = { optional = true, workspace = true }
w3f-bls = { optional = true, workspace = true }
# bandersnatch crypto
ark-vrf = { optional = true, workspace = true, features = ["bandersnatch", "ring"] }

# soil-crypto-ec-utils dependencies (all optional, behind curve features)
ark-bls12-377 = { features = ["curve"], optional = true, workspace = true }
ark-bls12-377-ext = { optional = true, workspace = true }
ark-bls12-381 = { features = ["curve"], optional = true, workspace = true }
ark-bls12-381-ext = { optional = true, workspace = true }
ark-bw6-761 = { optional = true, workspace = true }
ark-bw6-761-ext = { optional = true, workspace = true }
ark-ec = { optional = true, workspace = true }
ark-ed-on-bls12-377 = { optional = true, workspace = true }
ark-ed-on-bls12-377-ext = { optional = true, workspace = true }
ark-ed-on-bls12-381-bandersnatch = { optional = true, workspace = true }
ark-ed-on-bls12-381-bandersnatch-ext = { optional = true, workspace = true }
ark-scale = { features = ["hazmat"], optional = true, workspace = true }

[target.'cfg(all(any(target_arch = "riscv32", target_arch = "riscv64"), substrate_runtime))'.dependencies]
polkavm-derive = { workspace = true }

[target.'cfg(not(substrate_runtime))'.dependencies]
futures = { version = "0.3.30", default-features = false, features = ["alloc"] }
dyn-clone = "1.0.17"
# soil-io target deps
ed25519-dalek = { workspace = true }

[build-dependencies]
rustversion = { workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
primitive-types = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
criterion = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
rustversion = { workspace = true }
trybuild = { workspace = true }
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }
trie-bench = { workspace = true }
trie-standardmap = { workspace = true }
zstd = { workspace = true }
ark-ff = { workspace = true }
ark-std = { workspace = true }
substrate-test-utils = { workspace = true }

[features]
default = ["std"]
std = [
	# soil-inherents std features
	"async-trait",
	"bytes/std",
	"subsoil-crypto-hashing/std",
	"bounded-collections/std",
	"backtrace",
	"regex",
	"anyhow?/std",
	"codec/std",
	"environmental/std",
	"frame-metadata/std",
	"hash-db/std",
	"log/std",
	"num-traits/std",
	"scale-info/std",
	"serde/std",
	"kvdb",
	"parking_lot",
	"tracing-core/std",
	"tracing-subscriber",
	"tracing/std",
	"with-tracing",
	"impl-serde/std",
	# soil-core std features
	"ark-vrf?/std",
	"bip39/rand",
	"bip39/std",
	"blake2/std",
	"bs58/std",
	"ed25519-zebra/std",
	"full_crypto",
	"futures/std",
	"futures/thread-pool",
	"hash256-std-hasher/std",
	"itertools",
	"k256/std",
	"libsecp256k1/std",
	"merlin/std",
	"primitive-types/byteorder",
	"primitive-types/rustc-hex",
	"primitive-types/serde",
	"primitive-types/std",
	"rand",
	"schnorrkel/std",
	"secp256k1/global-context",
	"secp256k1/std",
	"sha2?/std",
	"ss58-registry/std",
	"substrate-bip39/std",
	"thiserror",
	# soil-trie std features
	"ahash",
	"foldhash/std",
	"memory-db/std",
	"nohash-hasher",
	"prometheus-endpoint",
	"schnellru",
	"trie-db/std",
	"trie-root/std",
	"w3f-bls?/std",
	"zeroize/alloc",
	"zeroize/std",
	# soil-version std features
	"parity-wasm",
	# soil-io std features
	"ed25519-dalek/std",
	# soil-runtime std features
	"either/std",
	"either/use_std",
	"simple-mermaid",
	"strum/std",
	"tuplex/std",
	# soil-api std features
	# soil-crypto-ec-utils std features
	"ark-bls12-377-ext?/std",
	"ark-bls12-377?/std",
	"ark-bls12-381-ext?/std",
	"ark-bls12-381?/std",
	"ark-bw6-761-ext?/std",
	"ark-bw6-761?/std",
	"ark-ec?/parallel",
	"ark-ec?/std",
	"ark-ed-on-bls12-377-ext?/std",
	"ark-ed-on-bls12-377?/std",
	"ark-ed-on-bls12-381-bandersnatch-ext?/std",
	"ark-ed-on-bls12-381-bandersnatch?/std",
	"ark-ff/std",
	"ark-scale?/std",
	"ark-std/std",
]
runtime-benchmarks = []
# soil-npos-elections features
npos-elections-bench = []
try-runtime = []
debug = []
wasm-interface-wasmtime = ["anyhow", "dep:wasmtime"]
with-tracing = ["codec/derive", "codec/full"]
rocksdb = ["kvdb-rocksdb"]
serde = [
	"dep:serde",
	"impl-serde",
	"scale-info/serde",
	"bounded-collections/serde",
	# soil-core serde features
	"blake2",
	"bs58/alloc",
	"k256/serde",
	"primitive-types/serde_no_std",
]
full-metadata-docs = ["scale-info/docs"]
json-schema = ["dep:schemars"]

# soil-core features
full_crypto = ["blake2"]
bls-experimental = ["sha2", "w3f-bls"]
bandersnatch-experimental = ["ark-vrf"]

# soil-crypto-ec-utils features
crypto-ec-utils-common = ["ark-ec", "ark-scale"]
crypto-ec-utils-bls12-377 = ["ark-bls12-377", "ark-bls12-377-ext", "crypto-ec-utils-common"]
crypto-ec-utils-bls12-381 = ["ark-bls12-381", "ark-bls12-381-ext", "crypto-ec-utils-common"]
crypto-ec-utils-bw6-761 = ["ark-bw6-761", "ark-bw6-761-ext", "crypto-ec-utils-common"]
crypto-ec-utils-ed-on-bls12-377 = ["ark-ed-on-bls12-377", "ark-ed-on-bls12-377-ext", "crypto-ec-utils-common"]
crypto-ec-utils-ed-on-bls12-381-bandersnatch = [
	"ark-ed-on-bls12-381-bandersnatch",
	"ark-ed-on-bls12-381-bandersnatch-ext",
	"crypto-ec-utils-common",
]
crypto-ec-utils-all-curves = [
	"crypto-ec-utils-bls12-377",
	"crypto-ec-utils-bls12-381",
	"crypto-ec-utils-bw6-761",
	"crypto-ec-utils-ed-on-bls12-377",
	"crypto-ec-utils-ed-on-bls12-381-bandersnatch",
]

# ATTENTION
#
# Only use when you know what you are doing.
#
# Disables static assertions in `impls.rs` that checks the word size. To prevent any footgun, the
# check is changed into a runtime check.
disable_target_static_assertions = []

# soil-state-machine features
fuzzing = ["arbitrary"]

# soil-io features
io-disable_panic_handler = []
io-disable_oom = []
io-disable_allocator = []
io-improved_panic_error_reporting = []

# soil-api features
disable-logging = ["log/max_level_off"]
no-metadata-docs = ["subsoil-derive/no-metadata-docs"]
frame-metadata = []
