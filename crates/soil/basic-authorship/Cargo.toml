[package]
name = "soil-basic-authorship"
version = "0.34.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Basic implementation of block-authoring logic."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
sc-block-builder = { workspace = true, default-features = true, optional = true}
soil-proposer-metrics = { workspace = true, default-features = true, optional = true}
soil-telemetry = { workspace = true, default-features = true, optional = true}
soil-transaction-pool-api = { workspace = true, default-features = true, optional = true}
soil-api = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true}
soil-inherents = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"futures",
	"log",
	"prometheus-endpoint",
	"sc-block-builder",
	"soil-api",
	"soil-blockchain",
	"soil-consensus",
	"subsoil",
	"soil-inherents",
	"soil-proposer-metrics",
	"soil-runtime",
	"soil-telemetry",
	"soil-transaction-pool-api",
	"soil-api/std",
	"subsoil/std",
	"soil-inherents/std",
	"soil-proposer-metrics/std",
	"soil-runtime/std",
	"soil-telemetry/std",
	"soil-transaction-pool-api/std",
]

[dev-dependencies]
parking_lot = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
sc-transaction-pool = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
