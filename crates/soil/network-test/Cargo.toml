[package]
description = "Integration tests for Substrate network protocol"
name = "soil-network-test"
version = "0.8.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
publish = false
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-channel = { workspace = true, optional = true}
async-trait = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
futures-timer = { workspace = true, optional = true}
libp2p = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
rand = { workspace = true, default-features = true, optional = true}
sc-block-builder = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-consensus = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-network-common = { workspace = true, default-features = true, optional = true}
soil-network-light = { workspace = true, default-features = true, optional = true}
soil-network-sync = { workspace = true, default-features = true, optional = true}
soil-network-types = { workspace = true, default-features = true, optional = true}
soil-service = { workspace = true, optional = true}
soil-utils = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
soil-tracing = { workspace = true, default-features = true, optional = true}
substrate-test-runtime = { workspace = true, optional = true}
substrate-test-runtime-client = { workspace = true, optional = true}
tokio = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"async-channel",
	"async-trait",
	"futures",
	"futures-timer",
	"libp2p",
	"log",
	"parking_lot",
	"rand",
	"sc-block-builder",
	"sc-consensus",
	"soil-blockchain",
	"soil-client-api",
	"soil-consensus",
	"soil-core",
	"soil-network",
	"soil-network-common",
	"soil-network-light",
	"soil-network-sync",
	"soil-network-types",
	"soil-runtime",
	"soil-service",
	"soil-tracing",
	"soil-utils",
	"substrate-test-runtime",
	"substrate-test-runtime-client",
	"tokio",
	"soil-client-api/std",
	"soil-core/std",
	"soil-network/std",
	"soil-network-common/std",
	"soil-network-light/std",
	"soil-network-sync/std",
	"soil-network-types/std",
	"soil-runtime/std",
	"soil-service/std",
	"soil-tracing/std",
	"soil-utils/std",
]
