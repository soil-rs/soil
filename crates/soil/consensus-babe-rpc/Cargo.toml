[package]
name = "soil-consensus-babe-rpc"
version = "0.34.0"
authors.workspace = true
description = "RPC extensions for the BABE consensus algorithm"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
futures = { workspace = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
sc-consensus-babe = { workspace = true, default-features = true, optional = true}
soil-consensus-epochs = { workspace = true, default-features = true, optional = true}
soil-rpc-api = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-consensus-babe = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"futures",
	"jsonrpsee",
	"sc-consensus-babe",
	"serde",
	"subsoil",
	"soil-blockchain",
	"soil-consensus",
	"soil-consensus-babe",
	"soil-consensus-epochs",
	"soil-rpc-api",
	"subsoil",
	"thiserror",
	"subsoil/std",
	"soil-consensus-babe/std",
	"soil-consensus-epochs/std",
	"soil-rpc-api/std",
	"subsoil/std"]

[dev-dependencies]
sc-consensus = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }
