[package]
name = "soil-api"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate runtime api primitives"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
docify = { workspace = true }
hash-db = { optional = true, workspace = true, default-features = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil-api-proc-macro = { workspace = true }
soil-core = { workspace = true }
soil-externalities = { optional = true, workspace = true }
soil-metadata-ir = { optional = true, workspace = true }
soil-runtime = { workspace = true }
soil-runtime-interface = { workspace = true }
soil-state-machine = { optional = true, workspace = true }
soil-trie = { optional = true, workspace = true }
soil-version = { workspace = true }
thiserror = { optional = true, workspace = true }

[dev-dependencies]
soil-test-primitives = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"hash-db",
	"log/std",
	"scale-info/std",
	"subsoil-api-proc-macro/std",
	"soil-core/std",
	"soil-externalities",
	"soil-externalities?/std",
	"soil-metadata-ir?/std",
	"soil-runtime-interface/std",
	"soil-runtime/std",
	"soil-state-machine/std",
	"soil-test-primitives/std",
	"soil-trie/std",
	"soil-version/std",
	"thiserror",
]
# Special feature to disable logging completely.
#
# By default `sp-api` initializes the `RuntimeLogger` for each runtime api function. However,
# logging functionality increases the code size. It is recommended to enable this feature when
# building a runtime for registering it on chain.
#
# This sets the max logging level to `off` for `log`.
disable-logging = ["log/max_level_off"]
# Do not report the documentation in the metadata.
no-metadata-docs = ["subsoil-api-proc-macro/no-metadata-docs"]
frame-metadata = ["soil-metadata-ir"]
