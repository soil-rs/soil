[package]
description = "Substrate sync network protocol"
name = "soil-network-sync"
version = "0.33.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/soil-network-sync"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true, default-features = true, optional = true}
async-channel = { workspace = true, optional = true}
async-trait = { workspace = true, optional = true}
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
fork-tree = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
mockall = { workspace = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
prost = { workspace = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-consensus = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-network-common = { workspace = true, default-features = true, optional = true}
soil-network-types = { workspace = true, default-features = true, optional = true}
soil-utils = { workspace = true, default-features = true, optional = true}
schnellru = { workspace = true, optional = true}
smallvec = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}
tokio = { features = ["macros", "time"], workspace = true, default-features = true, optional = true}
tokio-stream = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"array-bytes",
	"async-channel",
	"async-trait",
	"codec",
	"fork-tree",
	"futures",
	"log",
	"mockall",
	"prometheus-endpoint",
	"prost",
	"sc-consensus",
	"schnellru",
	"smallvec",
	"soil-blockchain",
	"soil-client-api",
	"soil-consensus",
	"soil-core",
	"soil-network",
	"soil-network-common",
	"soil-network-types",
	"soil-runtime",
	"soil-utils",
	"thiserror",
	"tokio",
	"tokio-stream",
	"subsoil/std",
	"soil-client-api/std",
	"soil-core/std",
	"soil-network/std",
	"soil-network-common/std",
	"soil-network-types/std",
	"soil-runtime/std",
	"soil-utils/std",
]

[dev-dependencies]
quickcheck = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
soil-test-primitives = { workspace = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }

[build-dependencies]
prost-build = { workspace = true }
