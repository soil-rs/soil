[package]
description = "Substrate sync network protocol"
name = "soil-network-sync"
version = "0.33.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/soil-network-sync"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true, default-features = true}
async-channel = { workspace = true}
async-trait = { workspace = true}
codec = { features = ["derive"], workspace = true, default-features = true}
fork-tree = { workspace = true, default-features = true}
futures = { workspace = true}
log = { workspace = true, default-features = true}
mockall = { workspace = true}
prometheus-endpoint = { workspace = true, default-features = true}
prost = { workspace = true}
soil-client-api = { workspace = true, default-features = true}
sc-consensus = { workspace = true, default-features = true}
soil-network = { workspace = true, default-features = true}
soil-network-common = { workspace = true, default-features = true}
soil-network-types = { workspace = true, default-features = true}
soil-utils = { workspace = true, default-features = true}
schnellru = { workspace = true}
smallvec = { workspace = true, default-features = true}
soil-blockchain = { workspace = true, default-features = true}
soil-consensus = { workspace = true, default-features = true}
thiserror = { workspace = true}
tokio = { features = ["macros", "time"], workspace = true, default-features = true}
tokio-stream = { workspace = true}
subsoil = { workspace = true}

[dev-dependencies]
quickcheck = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
soil-test-primitives = { workspace = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }

[build-dependencies]
prost-build = { workspace = true }
