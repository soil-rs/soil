[package]
name = "soil-sysinfo"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "A crate that provides basic hardware and software telemetry information."
documentation = "https://docs.rs/soil-sysinfo"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
derive_more = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
libc = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
rand = { workspace = true, default-features = true, optional = true}
rand_pcg = { workspace = true, optional = true}
regex = { workspace = true, optional = true}
soil-telemetry = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
serde_json = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true}
subsoil-crypto-hashing = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"derive_more",
	"futures",
	"libc",
	"log",
	"rand",
	"rand_pcg",
	"regex",
	"serde",
	"serde_json",
	"subsoil",
	"subsoil-crypto-hashing",
	"soil-telemetry",
	"subsoil/std",
	"subsoil-crypto-hashing/std",
	"soil-telemetry/std",
]

[dev-dependencies]
