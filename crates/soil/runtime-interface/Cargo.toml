[package]
name = "soil-runtime-interface"
version = "24.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate runtime interface"
documentation = "https://docs.rs/sp-runtime-interface/"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
bytes = { workspace = true }
codec = { features = ["bytes"], workspace = true }
impl-trait-for-tuples = { workspace = true }
soil-externalities = { workspace = true }
subsoil-runtime-interface-proc-macro = { workspace = true, default-features = true }
subsoil = { workspace = true }
soil-storage = { workspace = true }
static_assertions = { workspace = true, default-features = true }

[target.'cfg(all(any(target_arch = "riscv32", target_arch = "riscv64"), substrate_runtime))'.dependencies]
polkavm-derive = { workspace = true }

[dev-dependencies]
rustversion = { workspace = true }
soil-io = { workspace = true, default-features = true }
sp-runtime-interface-test-wasm = { workspace = true }
soil-state-machine = { workspace = true, default-features = true }
trybuild = { workspace = true }

[features]
default = ["std"]
std = [
	"bytes/std",
	"codec/std",
	"soil-externalities/std",
	"soil-io/std",
	"sp-runtime-interface-test-wasm/std",
	"soil-state-machine/std",
	"subsoil/std",
	"soil-storage/std",
	"subsoil/std",
]

# ATTENTION
#
# Only use when you know what you are doing.
#
# Disables static assertions in `impls.rs` that checks the word size. To prevent any footgun, the
# check is changed into a runtime check.
disable_target_static_assertions = []
