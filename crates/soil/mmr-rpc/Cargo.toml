[package]
name = "soil-mmr-rpc"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Node-specific RPC methods for interaction with Merkle Mountain Range pallet."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
soil-api = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-mmr-primitives = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"jsonrpsee",
	"serde",
	"soil-api",
	"soil-blockchain",
	"soil-core",
	"soil-mmr-primitives",
	"soil-runtime",
	"soil-api/std",
	"soil-core/std",
	"soil-mmr-primitives/std",
	"soil-runtime/std",
]

[dev-dependencies]
serde_json = { workspace = true, default-features = true }
