[package]
name = "soil-chain-spec"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate chain configurations."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true, default-features = true, optional = true}
clap = { features = ["derive"], optional = true, workspace = true }
codec = { features = ["derive"], workspace = true, optional = true}
docify = { workspace = true, optional = true}
memmap2 = { workspace = true, optional = true}
soil-chain-spec-derive = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
soil-executor = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-telemetry = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
serde_json = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
subsoil-crypto-hashing = { workspace = true, default-features = true, optional = true}
soil-genesis-builder = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true }

[features]
default = ["std"]
std = [
	"array-bytes",
	"clap",
	"codec",
	"docify",
	"memmap2",
	"serde",
	"serde_json",
	"soil-blockchain",
	"soil-chain-spec-derive",
	"soil-client-api",
	"subsoil",
	"subsoil-crypto-hashing",
	"soil-executor",
	"soil-genesis-builder",
	"soil-network",
	"soil-telemetry",
	"soil-client-api/std",
	"subsoil/std",
	"subsoil-crypto-hashing/std",
	"soil-executor/std",
	"soil-genesis-builder/std",
	"soil-network/std",
	"soil-telemetry/std",
]

[dev-dependencies]
pretty_assertions = { workspace = true }
regex = { workspace = true }
soil-consensus-babe = { features = ["serde"], workspace = true }
substrate-test-runtime = { workspace = true }
