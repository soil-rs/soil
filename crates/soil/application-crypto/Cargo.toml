[package]
name = "soil-application-crypto"
version = "30.0.0"
authors.workspace = true
edition.workspace = true
description = "Provides facilities for generating application specific crypto wrapper types."
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/sp-application-crypto"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, features = ["alloc", "derive"], workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"full_crypto",
	"scale-info/std",
	"serde/std",
	"soil-core/std",
	"soil-io/std",
]

# Serde support without relying on std features.
serde = ["dep:serde", "scale-info/serde", "soil-core/serde"]

# This feature enables all crypto primitives for `no_std` builds like microcontrollers
# or Intel SGX.
# For the regular wasm runtime builds this should not be used.
full_crypto = [
	"soil-core/full_crypto",
	"soil-io/disable_oom",
	# Don't add `panic_handler` and `alloc_error_handler` since they are expected to be provided
	# by the user anyway.
	"soil-io/disable_panic_handler",
]

# This feature adds BLS crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bls-experimental = ["soil-core/bls-experimental", "soil-io/bls-experimental"]

# This feature adds Bandersnatch crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bandersnatch-experimental = [
	"soil-core/bandersnatch-experimental",
	"soil-io/bandersnatch-experimental",
]
