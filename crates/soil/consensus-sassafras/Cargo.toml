[package]
name = "soil-consensus-sassafras"
version = "0.3.4-dev"
authors.workspace = true
description = "Primitives for Sassafras consensus"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository = "https://github.com/paritytech/polkadot-sdk/"
documentation = "https://docs.rs/sp-consensus-sassafras"
readme = "README.md"
publish = false

[package.metadata.polkadot-sdk]
exclude-from-umbrella = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], optional = true, workspace = true }
soil-api = { workspace = true }
soil-consensus-slots = { workspace = true }
subsoil = { features = ["bandersnatch-experimental"], workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"scale-info/std",
	"serde/std",
	"soil-api/std",
	"subsoil/std",
	"soil-consensus-slots/std",
	"subsoil/std",
]

# Serde support without relying on std features.
serde = [
	"dep:serde",
	"scale-info/serde",
	"subsoil/serde",
	"soil-consensus-slots/serde",
	"subsoil/serde",
]
