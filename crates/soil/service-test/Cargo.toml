[package]
name = "soil-service-test"
version = "2.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true, default-features = true, optional = true}
async-channel = { workspace = true, optional = true}
codec = { workspace = true, default-features = true, optional = true}
fdlimit = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
sc-block-builder = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
soil-client-db = { workspace = true, optional = true}
sc-consensus = { workspace = true, default-features = true, optional = true}
soil-executor = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-network-sync = { workspace = true, default-features = true, optional = true}
soil-service = { workspace = true, default-features = true, optional = true}
soil-transaction-pool-api = { workspace = true, default-features = true, optional = true}
soil-api = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true }
substrate-test-runtime = { workspace = true, optional = true}
substrate-test-runtime-client = { workspace = true, optional = true}
tempfile = { workspace = true, optional = true}
tokio = { features = ["time"], workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"array-bytes",
	"async-channel",
	"codec",
	"fdlimit",
	"futures",
	"log",
	"parking_lot",
	"sc-block-builder",
	"sc-consensus",
	"soil-api",
	"soil-blockchain",
	"soil-client-api",
	"soil-client-db",
	"soil-consensus",
	"subsoil",
	"soil-executor",
	"soil-network",
	"soil-network-sync",
	"soil-runtime",
	"soil-service",
	"soil-transaction-pool-api",
	"substrate-test-runtime",
	"substrate-test-runtime-client",
	"tempfile",
	"tokio",
	"soil-api/std",
	"soil-client-api/std",
	"soil-client-db/std",
	"subsoil/std",
	"soil-executor/std",
	"soil-network/std",
	"soil-network-sync/std",
	"soil-runtime/std",
	"soil-service/std",
	"soil-transaction-pool-api/std",
]
