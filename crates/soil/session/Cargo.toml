[package]
name = "soil-session"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Primitives for sessions"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-core = { workspace = true }
soil-keystore = { optional = true, workspace = true }
soil-runtime = { workspace = true }
soil-staking = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"scale-info/std",
	"soil-api/std",
	"soil-core/std",
	"soil-keystore/std",
	"soil-runtime/std",
	"soil-staking/std",
]
