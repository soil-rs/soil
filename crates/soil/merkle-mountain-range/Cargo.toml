[package]
name = "soil-mmr-primitives"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Merkle Mountain Range primitives."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
log = { workspace = true }
mmr-lib = { workspace = true, default-features = false }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
soil-api = { workspace = true }
soil-core = { workspace = true }
soil-debug-derive = { workspace = true }
soil-runtime = { workspace = true }
thiserror = { optional = true, workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"dep:thiserror",
	"log/std",
	"mmr-lib/std",
	"scale-info/std",
	"serde/std",
	"soil-api/std",
	"soil-core/std",
	"soil-debug-derive/std",
	"soil-runtime/std",
]

# Serde support without relying on std features.
serde = ["dep:serde", "scale-info/serde", "soil-core/serde", "soil-runtime/serde"]
