[package]
name = "soil-blockchain"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate blockchain traits and primitives."
documentation = "https://docs.rs/sp-blockchain"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
futures = { workspace = true }
parking_lot = { workspace = true, default-features = true }
schnellru = { workspace = true }
soil-api = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
thiserror = { workspace = true }
tracing = { workspace = true, default-features = true }
