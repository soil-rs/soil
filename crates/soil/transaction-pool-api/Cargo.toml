[package]
name = "soil-transaction-pool-api"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Transaction pool client facing API."

[lints]
workspace = true

[dependencies]
soil-client = { workspace = true, default-features = true }
async-trait = { workspace = true, optional = true}
codec = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
indexmap = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, optional = true}
strum = { workspace = true, features = ["derive"], optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"async-trait",
	"codec",
	"futures",
	"indexmap",
	"log",
	"serde",
	"subsoil",
	"strum",
	"thiserror",
	"subsoil/std",
]

[dev-dependencies]
serde_json = { workspace = true, default-features = true }
