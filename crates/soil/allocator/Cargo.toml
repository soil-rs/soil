[package]
name = "soil-allocator"
version = "23.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Collection of allocator implementations."
documentation = "https://docs.rs/soil-allocator"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
log = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"log",
	"subsoil",
	"subsoil",
	"thiserror",
	"subsoil/std",
]
