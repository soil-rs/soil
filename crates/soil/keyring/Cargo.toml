[package]
name = "soil-keyring"
version = "31.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Keyring support code for the runtime. A set of test accounts."
documentation = "https://docs.rs/sp-keyring"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
soil-core = { workspace = true }
soil-runtime = { workspace = true }
strum = { features = ["derive"], workspace = true }

[features]
default = ["std"]
std = ["soil-core/std", "soil-runtime/std", "strum/std"]

# This feature adds Bandersnatch crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bandersnatch-experimental = ["soil-core/bandersnatch-experimental"]
