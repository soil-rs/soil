[package]
name = "soil-executor-wasmtime"
version = "0.29.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Defines a `WasmRuntime` that uses the Wasmtime JIT to execute."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
log = { workspace = true, default-features = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}

# When bumping wasmtime do not forget to also bump rustix
# to exactly the same version as used by wasmtime!
anyhow = { workspace = true, optional = true}
soil-allocator = { workspace = true, default-features = true, optional = true}
soil-executor-common = { workspace = true, default-features = true, optional = true}
soil-runtime-interface = { workspace = true, default-features = true, optional = true}
soil-wasm-interface = { features = ["wasmtime"], workspace = true, default-features = true, optional = true}
wasmtime = { features = [
	"addr2line",
	"cache",
	"cranelift",
	"demangle",
	"gc",
	"gc-null",
	"parallel-compilation",
	"pooling-allocator",
	"profiling",
	"threads",
], workspace = true, optional = true }

# Here we include the rustix crate in the exactly same semver-compatible version as used by
# wasmtime and enable its 'use-libc' flag.
#
# By default rustix directly calls the appropriate syscalls completely bypassing libc;
# this doesn't have any actual benefits for us besides making it harder to debug memory
# problems (since then `mmap` etc. cannot be easily hooked into).
rustix = { features = ["fs", "mm", "param", "std", "use-libc"], workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"anyhow",
	"log",
	"parking_lot",
	"rustix",
	"soil-allocator",
	"soil-executor-common",
	"soil-runtime-interface",
	"soil-wasm-interface",
	"wasmtime",
	"soil-allocator/std",
	"soil-executor-common/std",
	"soil-runtime-interface/std",
	"soil-wasm-interface/std",
]

[dev-dependencies]
cargo_metadata = { workspace = true }
codec = { workspace = true, default-features = true }
paste = { workspace = true, default-features = true }
soil-runtime-test = { workspace = true }
soil-io = { workspace = true, default-features = true }
tempfile = { workspace = true }
wat = { workspace = true }
