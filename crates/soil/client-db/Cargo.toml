[package]
name = "soil-client-db"
version = "0.35.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Client backend that uses RocksDB database as storage."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "state_access"
harness = false

[lib]
bench = false

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true}
hash-db = { workspace = true, default-features = true}
kvdb = { workspace = true}
kvdb-memorydb = { workspace = true}
kvdb-rocksdb = { optional = true, workspace = true }
linked-hash-map = { workspace = true}
log = { workspace = true, default-features = true}
parity-db = { workspace = true}
parking_lot = { workspace = true, default-features = true}
prometheus-endpoint = { workspace = true, default-features = true}
soil-client-api = { workspace = true, default-features = true}
soil-state-db = { workspace = true, default-features = true}
schnellru = { workspace = true}
soil-blockchain = { workspace = true, default-features = true}
subsoil = { workspace = true, default-features = true}
sysinfo = { workspace = true}

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
criterion = { workspace = true, default-features = true }
kvdb-rocksdb = { workspace = true }
rand = { workspace = true, default-features = true }
kitchensink-runtime = { workspace = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }

[features]
test-helpers = []
runtime-benchmarks = [
	"subsoil/runtime-benchmarks",
]
rocksdb = ["kvdb-rocksdb", "subsoil/rocksdb"]
jemalloc-allocator = ["kvdb-rocksdb?/jemalloc"]
