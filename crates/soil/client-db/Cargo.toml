[package]
name = "soil-client-db"
version = "0.35.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Client backend that uses RocksDB database as storage."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "state_access"
harness = false

[lib]
bench = false

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
hash-db = { workspace = true, default-features = true, optional = true}
kvdb = { workspace = true, optional = true}
kvdb-memorydb = { workspace = true, optional = true}
kvdb-rocksdb = { optional = true, workspace = true }
linked-hash-map = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
parity-db = { workspace = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
soil-state-db = { workspace = true, default-features = true, optional = true}
schnellru = { workspace = true, optional = true}
soil-arithmetic = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-database = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
soil-state-machine = { workspace = true, default-features = true, optional = true}
soil-trie = { workspace = true, default-features = true, optional = true}
sysinfo = { workspace = true, optional = true}

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
criterion = { workspace = true, default-features = true }
kvdb-rocksdb = { workspace = true }
rand = { workspace = true, default-features = true }
soil-database = { workspace = true, default-features = true, features = ["rocksdb"] }
soil-tracing = { workspace = true, default-features = true }
kitchensink-runtime = { workspace = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }

[features]
std = [
	"codec",
	"hash-db",
	"kvdb",
	"kvdb-memorydb",
	"kvdb-rocksdb",
	"linked-hash-map",
	"log",
	"parity-db",
	"parking_lot",
	"prometheus-endpoint",
	"schnellru",
	"soil-arithmetic",
	"soil-blockchain",
	"soil-client-api",
	"soil-core",
	"soil-database",
	"soil-runtime",
	"soil-state-db",
	"soil-state-machine",
	"soil-trie",
	"sysinfo",
	"soil-arithmetic/std",
	"soil-client-api/std",
	"soil-core/std",
	"soil-runtime/std",
	"soil-state-db/std",
	"soil-state-machine/std",
	"soil-trie/std",
]
default = ["std"]
test-helpers = []
runtime-benchmarks = [
	"soil-runtime/runtime-benchmarks",
]
rocksdb = ["kvdb-rocksdb", "soil-database/rocksdb"]
jemalloc-allocator = ["kvdb-rocksdb?/jemalloc"]
