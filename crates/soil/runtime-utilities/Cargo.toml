[package]
description = "Substrate client utilities for frame runtime functions calls."
name = "soil-runtime-utilities"
version = "0.1.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/sc-metadata"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true, optional = true}

soil-executor = { workspace = true, default-features = true, optional = true}
soil-executor-common = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
subsoil-crypto-hashing = { workspace = true, default-features = true, optional = true}
soil-state-machine = { workspace = true, default-features = true, optional = true}
soil-wasm-interface = { workspace = true, default-features = true, optional = true}

thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"soil-core",
	"subsoil-crypto-hashing",
	"soil-executor",
	"soil-executor-common",
	"soil-state-machine",
	"soil-wasm-interface",
	"thiserror",
	"soil-core/std",
	"subsoil-crypto-hashing/std",
	"soil-executor/std",
	"soil-executor-common/std",
	"soil-state-machine/std",
	"soil-wasm-interface/std",
]

[dev-dependencies]
soil-io = { workspace = true, default-features = true }
soil-version = { workspace = true, default-features = true }
subxt = { workspace = true, features = ["native"] }
