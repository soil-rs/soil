[package]
name = "soil-sync-state-rpc"
version = "0.34.0"
authors.workspace = true
description = "A RPC handler to create sync states for light clients."
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
soil-chain-spec = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-consensus-babe = { workspace = true, default-features = true, optional = true}
soil-consensus-epochs = { workspace = true, default-features = true, optional = true}
sc-consensus-grandpa = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
serde_json = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"jsonrpsee",
	"sc-consensus-babe",
	"sc-consensus-grandpa",
	"serde",
	"serde_json",
	"soil-blockchain",
	"soil-chain-spec",
	"soil-client-api",
	"soil-consensus-epochs",
	"subsoil",
	"thiserror",
	"soil-chain-spec/std",
	"soil-client-api/std",
	"soil-consensus-epochs/std",
	"subsoil/std",
]
