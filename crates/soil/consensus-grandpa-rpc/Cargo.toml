[package]
name = "soil-consensus-grandpa-rpc"
version = "0.19.0"
authors.workspace = true
description = "RPC extensions for the GRANDPA finality gadget"
repository.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
homepage.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
finality-grandpa = { features = ["derive-codec"], workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-consensus-grandpa = { workspace = true, default-features = true, optional = true}
sc-rpc = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"finality-grandpa",
	"futures",
	"jsonrpsee",
	"log",
	"sc-consensus-grandpa",
	"sc-rpc",
	"serde",
	"soil-blockchain",
	"soil-client-api",
	"subsoil",
	"thiserror",
	"soil-client-api/std",
	"subsoil/std",
]

[dev-dependencies]
sc-block-builder = { workspace = true, default-features = true }
sc-rpc = { features = ["test-helpers"], workspace = true, default-features = true }
soil-consensus-grandpa = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tokio = { features = ["macros"], workspace = true, default-features = true }
