[package]
name = "soil-executor"
version = "0.32.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "A crate that provides means of executing/dispatching calls into the runtime."
documentation = "https://docs.rs/soil-executor"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[dependencies]
subsoil = { workspace = true }
parking_lot = { workspace = true, default-features = true}
schnellru = { workspace = true}
tracing = { workspace = true, default-features = true}

codec = { workspace = true, default-features = true}
soil-executor-common = { workspace = true, default-features = true}
soil-executor-polkavm = { workspace = true, default-features = true}
soil-executor-wasmtime = { workspace = true, default-features = true}
soil-client = { workspace = true, default-features = true }
[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
assert_matches = { workspace = true }
criterion = { workspace = true, default-features = true }
num_cpus = { workspace = true }
paste = { workspace = true, default-features = true }
soil-runtime-test = { workspace = true }
sc-tracing = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
substrate-test-runtime = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
wat = { workspace = true }

[features]
# This crate does not have `no_std` support, we just require this for tests
wasm-extern-trace = []
