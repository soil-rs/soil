[package]
name = "soil-executor"
version = "0.32.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "A crate that provides means of executing/dispatching calls into the runtime."
documentation = "https://docs.rs/soil-executor"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[dependencies]
subsoil = { workspace = true }
parking_lot = { workspace = true, default-features = true, optional = true}
schnellru = { workspace = true, optional = true}
tracing = { workspace = true, default-features = true, optional = true}

codec = { workspace = true, default-features = true, optional = true}
soil-executor-common = { workspace = true, default-features = true, optional = true}
soil-executor-polkavm = { workspace = true, default-features = true, optional = true}
soil-executor-wasmtime = { workspace = true, default-features = true, optional = true}
soil-api = { workspace = true, default-features = true, optional = true}
soil-version = { workspace = true, default-features = true, optional = true}

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
assert_matches = { workspace = true }
criterion = { workspace = true, default-features = true }
num_cpus = { workspace = true }
paste = { workspace = true, default-features = true }
soil-runtime-test = { workspace = true }
sc-tracing = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
soil-maybe-compressed-blob = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
substrate-test-runtime = { workspace = true }
tempfile = { workspace = true }
tracing-subscriber = { workspace = true }
wat = { workspace = true }

[features]
default = ["std"]
# This crate does not have `no_std` support, we just require this for tests
std = [
	"codec",
	"parking_lot",
	"schnellru",
	"soil-api",
	"soil-executor-common",
	"soil-executor-polkavm",
	"soil-executor-wasmtime",
	"subsoil/std",
	"soil-version",
	"tracing",
	"soil-api/std",
	"soil-version/std",
	"soil-executor-common/std",
	"soil-executor-polkavm/std",
	"soil-executor-wasmtime/std",
]
wasm-extern-trace = []
