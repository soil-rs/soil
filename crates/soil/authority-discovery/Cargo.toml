[package]
name = "soil-authority-discovery"
version = "26.0.0"
authors.workspace = true
description = "Authority discovery primitives"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-application-crypto = { workspace = true }
soil-runtime = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"scale-info/std",
	"soil-api/std",
	"soil-application-crypto/std",
	"soil-runtime/std",
]
serde = [
	"scale-info/serde",
	"soil-application-crypto/serde",
	"soil-runtime/serde",
]
