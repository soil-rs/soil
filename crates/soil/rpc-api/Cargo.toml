[package]
name = "soil-rpc-api"
version = "0.33.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate RPC interfaces."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
soil-chain-spec = { workspace = true, default-features = true, optional = true}
sc-mixnet = { workspace = true, default-features = true, optional = true}
soil-transaction-pool-api = { workspace = true, default-features = true, optional = true}
scale-info = { features = ["derive"], workspace = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
serde_json = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-rpc = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
soil-statement-store = { features = ["serde"], workspace = true, default-features = true, optional = true}
soil-version = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"jsonrpsee",
	"sc-mixnet",
	"scale-info",
	"serde",
	"serde_json",
	"soil-chain-spec",
	"soil-core",
	"soil-rpc",
	"soil-runtime",
	"soil-statement-store",
	"soil-transaction-pool-api",
	"soil-version",
	"thiserror",
	"soil-chain-spec/std",
	"soil-core/std",
	"soil-runtime/std",
	"soil-statement-store/std",
	"soil-transaction-pool-api/std",
	"soil-version/std",
]
