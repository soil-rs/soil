[package]
name = "soil-rpc-api"
version = "0.33.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate RPC interfaces."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, default-features = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true}
soil-chain-spec = { workspace = true, default-features = true}
sc-mixnet = { workspace = true, default-features = true}
scale-info = { features = ["derive"], workspace = true}
serde = { features = ["derive"], workspace = true, default-features = true}
serde_json = { workspace = true, default-features = true}
subsoil = { workspace = true, default-features = true}
soil-client = { workspace = true, default-features = true }
soil-rpc = { workspace = true, default-features = true}
soil-statement-store = { features = ["serde"], workspace = true, default-features = true}
thiserror = { workspace = true}

[features]
