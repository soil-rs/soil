[package]
name = "soil-runtime"
version = "31.0.1"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Runtime Modules shared primitive types."
documentation = "https://docs.rs/sp-runtime"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
bytes = { workspace = true }
codec = { features = ["derive", "max-encoded-len"], workspace = true }
docify = { workspace = true }
either = { workspace = true }
hash256-std-hasher = { workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true }
num-traits = { workspace = true }
paste = { workspace = true, default-features = true }
rand = { optional = true, workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
soil-application-crypto = { workspace = true }
subsoil = { workspace = true }
strum = { workspace = true, features = ["derive"] }
tracing = { workspace = true, features = ["log"], default-features = false }

simple-mermaid = { workspace = true, optional = true }
tuplex = { workspace = true, default-features = false }

[dev-dependencies]
rand = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
zstd = { workspace = true }

[features]
runtime-benchmarks = []
try-runtime = []
default = ["std"]
std = [
	"bytes/std",
	"codec/std",
	"either/std",
	"either/use_std",
	"hash256-std-hasher/std",
	"log/std",
	"num-traits/std",
	"rand",
	"scale-info/std",
	"serde/std",
	"simple-mermaid",
	"soil-api/std",
	"soil-application-crypto/std",
	"subsoil/std",
	"strum/std",
	"tracing/std",
	"tuplex/std",
]

# Serde support without relying on std features.
serde = [
	"dep:serde",
	"scale-info/serde",
	"soil-application-crypto/serde",
	"subsoil/serde",
]

# This feature adds BLS crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bls-experimental = [
	"soil-application-crypto/bls-experimental",
	"subsoil/bls-experimental",
	"substrate-test-runtime-client/bls-experimental",
]
