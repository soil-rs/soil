[package]
description = "Substrate network protocol"
name = "soil-network"
version = "0.34.0"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/soil-network"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "notifications_protocol"
harness = false

[[bench]]
name = "request_response_protocol"
harness = false

[dependencies]
array-bytes = { workspace = true, default-features = true, optional = true}
async-channel = { workspace = true, optional = true}
async-trait = { workspace = true, optional = true}
asynchronous-codec = { workspace = true, optional = true}
bytes = { workspace = true, default-features = true, optional = true}
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
either = { workspace = true, default-features = true, optional = true}
fnv = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
futures-timer = { workspace = true, optional = true}
ip_network = { workspace = true, optional = true}
libp2p = { features = ["dns", "identify", "kad", "macros", "mdns", "noise", "ping", "request-response", "tcp", "tokio", "websocket", "yamux"], workspace = true, optional = true}
linked_hash_set = { workspace = true, optional = true}
litep2p = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
mockall = { workspace = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
partial_sort = { workspace = true, optional = true}
pin-project = { workspace = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
prost = { workspace = true, optional = true}
rand = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
soil-network-common = { workspace = true, default-features = true, optional = true}
soil-network-types = { workspace = true, default-features = true, optional = true}
soil-utils = { workspace = true, default-features = true, optional = true}
schnellru = { workspace = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
serde_json = { workspace = true, default-features = true, optional = true}
smallvec = { workspace = true, default-features = true, optional = true}
soil-arithmetic = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}
tokio = { features = ["macros", "sync"], workspace = true, default-features = true, optional = true}
tokio-stream = { workspace = true, optional = true}
unsigned-varint = { features = ["asynchronous_codec", "futures"], workspace = true, optional = true}
void = { workspace = true, optional = true}
wasm-timer = { workspace = true, optional = true}
zeroize = { workspace = true, default-features = true, optional = true}

[dev-dependencies]
assert_matches = { workspace = true }
cid = { workspace = true }
multistream-select = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-crypto-hashing = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }
substrate-test-runtime = { workspace = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }
tokio = { features = ["macros", "rt-multi-thread"], workspace = true, default-features = true }
tokio-util = { features = ["compat"], workspace = true }

criterion = { workspace = true, default-features = true, features = ["async_tokio"] }

[build-dependencies]
prost-build = { workspace = true }

[features]
std = [
	"array-bytes",
	"async-channel",
	"async-trait",
	"asynchronous-codec",
	"bytes",
	"codec",
	"either",
	"fnv",
	"futures",
	"futures-timer",
	"ip_network",
	"libp2p",
	"linked_hash_set",
	"litep2p",
	"log",
	"mockall",
	"parking_lot",
	"partial_sort",
	"pin-project",
	"prometheus-endpoint",
	"prost",
	"rand",
	"schnellru",
	"serde",
	"serde_json",
	"smallvec",
	"soil-arithmetic",
	"soil-blockchain",
	"soil-client-api",
	"soil-core",
	"soil-network-common",
	"soil-network-types",
	"soil-runtime",
	"soil-utils",
	"thiserror",
	"tokio",
	"tokio-stream",
	"unsigned-varint",
	"void",
	"wasm-timer",
	"zeroize",
	"soil-arithmetic/std",
	"soil-client-api/std",
	"soil-core/std",
	"soil-network-common/std",
	"soil-network-types/std",
	"soil-runtime/std",
	"soil-utils/std",
]
default = ["std"]
