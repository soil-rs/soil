[package]
description = "Substrate statement protocol"
name = "soil-network-statement"
version = "0.16.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/soil-network-statement"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[features]
default = ["std"]
std = [
	"array-bytes",
	"async-channel",
	"codec",
	"futures",
	"governor",
	"log",
	"prometheus-endpoint",
	"soil-consensus",
	"soil-network",
	"soil-network-common",
	"soil-network-sync",
	"soil-network-types",
	"soil-runtime",
	"soil-statement-store",
	"tokio",
	"soil-network/std",
	"soil-network-common/std",
	"soil-network-sync/std",
	"soil-network-types/std",
	"soil-runtime/std",
	"soil-statement-store/std",
]
test-helpers = []

[dependencies]
array-bytes = { workspace = true, default-features = true, optional = true}
async-channel = { workspace = true, optional = true}
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
governor = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-network-common = { workspace = true, default-features = true, optional = true}
soil-network-sync = { workspace = true, default-features = true, optional = true}
soil-network-types = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
soil-statement-store = { workspace = true, default-features = true, optional = true}
tokio = { workspace = true, optional = true}

[dev-dependencies]
async-trait = { workspace = true }
criterion = { workspace = true, default-features = true }
sc-keystore = { workspace = true, default-features = true }
sc-statement-store = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
soil-keyring = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "statement_network"
harness = false
required-features = ["test-helpers"]
