[package]
description = "Substrate statement protocol"
name = "soil-network-statement"
version = "0.16.0"
license.workspace = true
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/soil-network-statement"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[features]
test-helpers = []

[dependencies]
array-bytes = { workspace = true, default-features = true}
async-channel = { workspace = true}
codec = { features = ["derive"], workspace = true, default-features = true}
futures = { workspace = true}
governor = { workspace = true}
log = { workspace = true, default-features = true}
prometheus-endpoint = { workspace = true, default-features = true}
soil-network = { workspace = true, default-features = true}
soil-network-sync = { workspace = true, default-features = true}
soil-client = { workspace = true, default-features = true}
soil-statement-store = { workspace = true, default-features = true}
subsoil = { workspace = true }
tokio = { workspace = true}

[dev-dependencies]
async-trait = { workspace = true }
criterion = { workspace = true, default-features = true }
sc-statement-store = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
tempfile = { workspace = true }

[[bench]]
name = "statement_network"
harness = false
required-features = ["test-helpers"]
