[package]
name = "soil-executor-common"
version = "0.29.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "A set of common definitions that are needed for defining execution engines."
documentation = "https://docs.rs/soil-executor-common/"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
polkavm = { workspace = true, optional = true}
soil-allocator = { workspace = true, default-features = true, optional = true}
soil-maybe-compressed-blob = { workspace = true, default-features = true, optional = true}
soil-wasm-interface = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}
wasm-instrument = { workspace = true, default-features = true, optional = true}

[features]
std = [
	"polkavm",
	"soil-allocator",
	"soil-maybe-compressed-blob",
	"soil-wasm-interface",
	"thiserror",
	"wasm-instrument",
	"soil-allocator/std",
	"soil-wasm-interface/std",
]
default = ["std"]
