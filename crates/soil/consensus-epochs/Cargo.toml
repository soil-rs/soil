[package]
name = "soil-consensus-epochs"
version = "0.33.0"
authors.workspace = true
description = "Generic epochs-based utilities for consensus"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
fork-tree = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-consensus = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"fork-tree",
	"sc-consensus",
	"soil-blockchain",
	"soil-client-api",
	"soil-runtime",
	"soil-client-api/std",
	"soil-runtime/std",
]
