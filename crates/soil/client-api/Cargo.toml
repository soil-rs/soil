[package]
name = "soil-client-api"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate client interfaces."
documentation = "https://docs.rs/soil-client-api"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true, optional = true}
fnv = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
soil-executor = { workspace = true, default-features = true, optional = true}
soil-transaction-pool-api = { workspace = true, default-features = true, optional = true}
soil-utils = { workspace = true, default-features = true, optional = true}
soil-api = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, optional = true}
soil-database = { workspace = true, default-features = true, optional = true}
soil-externalities = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, optional = true}
soil-state-machine = { workspace = true, default-features = true, optional = true}
soil-storage = { workspace = true, default-features = true, optional = true}
soil-trie = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"fnv",
	"futures",
	"log",
	"parking_lot",
	"prometheus-endpoint",
	"soil-api",
	"soil-blockchain",
	"soil-consensus",
	"soil-core",
	"soil-database",
	"soil-executor",
	"soil-externalities",
	"soil-runtime",
	"soil-state-machine",
	"soil-storage",
	"soil-transaction-pool-api",
	"soil-trie",
	"soil-utils",
	"soil-api/std",
	"soil-core/std",
	"soil-executor/std",
	"soil-externalities/std",
	"soil-runtime/std",
	"soil-state-machine/std",
	"soil-storage/std",
	"soil-transaction-pool-api/std",
	"soil-trie/std",
	"soil-utils/std",
]

[dev-dependencies]
substrate-test-runtime = { workspace = true }
