[package]
name = "soil-cli"
version = "0.36.0"
authors.workspace = true
description = "Substrate CLI interface."
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }
array-bytes = { workspace = true, default-features = true}
bip39 = { workspace = true, default-features = true, features = ["rand"]}
chrono = { workspace = true}
clap = { features = ["derive", "string", "wrap_help"], workspace = true}
codec = { workspace = true, default-features = true}
fdlimit = { workspace = true}
futures = { workspace = true}
itertools = { workspace = true}
libp2p-identity = { features = ["ed25519", "peerid"], workspace = true}
log = { workspace = true, default-features = true}
names = { workspace = true}
rand = { workspace = true, default-features = true}
regex = { workspace = true}
rpassword = { workspace = true}
soil-client-api = { workspace = true, default-features = true}
soil-client-db = { workspace = true, default-features = false}
sc-keystore = { workspace = true, default-features = true}
sc-mixnet = { workspace = true, default-features = true}
soil-network = { workspace = true, default-features = true}
soil-service = { workspace = true, default-features = false}
soil-telemetry = { workspace = true, default-features = true}
sc-tracing = { workspace = true, default-features = true}
sc-transaction-pool = { workspace = true, default-features = true}
soil-utils = { workspace = true, default-features = true}
serde = { workspace = true, default-features = true}
serde_json = { workspace = true, default-features = true}
soil-blockchain = { workspace = true, default-features = true}
thiserror = { workspace = true}
tokio = { features = ["parking_lot", "rt-multi-thread", "signal"], workspace = true, default-features = true}

[dev-dependencies]
futures-timer = { workspace = true }
tempfile = { workspace = true }

[features]
default = ["rocksdb"]
rocksdb = ["soil-client-db/rocksdb"]
