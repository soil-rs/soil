[package]
name = "soil-state-machine"
version = "0.35.0"
authors.workspace = true
description = "Substrate State Machine"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/sp-state-machine"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }
arbitrary = { features = ["derive"], optional = true, workspace = true }
codec = { workspace = true }
hash-db = { workspace = true }
log = { workspace = true }
parking_lot = { optional = true, workspace = true, default-features = true }
rand = { optional = true, workspace = true, default-features = true }
smallvec = { workspace = true, default-features = true }
thiserror = { optional = true, workspace = true }
tracing = { optional = true, workspace = true, default-features = true }
trie-db = { workspace = true }

[dev-dependencies]
arbitrary = { features = ["derive"], workspace = true }
array-bytes = { workspace = true, default-features = true }
assert_matches = { workspace = true }
pretty_assertions = { workspace = true }
rand = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }

[features]
default = ["std"]
fuzzing = ["arbitrary"]
std = [
	"codec/std",
	"hash-db/std",
	"log/std",
	"parking_lot",
	"rand",
	"subsoil/std",
	"soil-runtime/std",
	"thiserror",
	"tracing",
	"trie-db/std",
]
