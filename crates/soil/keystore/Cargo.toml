[package]
name = "soil-keystore"
version = "0.34.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Keystore primitives."
documentation = "https://docs.rs/sp-core"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }
codec = { features = ["derive"], workspace = true }
parking_lot = { optional = true, workspace = true }
[features]
default = ["std"]
std = ["codec/std", "dep:parking_lot", "subsoil/std", "subsoil/std"]

# This feature adds BLS crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bls-experimental = ["subsoil/bls-experimental"]

# This feature adds Bandersnatch crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bandersnatch-experimental = ["subsoil/bandersnatch-experimental"]
