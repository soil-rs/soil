[package]
name = "soil-informant"
version = "0.33.0"
authors.workspace = true
description = "Substrate informant."
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
console = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
futures-timer = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-network-sync = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
subsoil = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"console",
	"futures",
	"futures-timer",
	"log",
	"soil-blockchain",
	"soil-client-api",
	"soil-network",
	"soil-network-sync",
	"subsoil",
	"soil-client-api/std",
	"soil-network/std",
	"soil-network-sync/std",
	"subsoil/std",
]
