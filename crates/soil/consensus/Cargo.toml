[package]
name = "soil-consensus"
version = "0.32.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Common utilities for building and using consensus engines in substrate."
documentation = "https://docs.rs/sp-consensus/"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }
async-trait = { workspace = true }
futures = { features = ["thread-pool"], workspace = true }
log = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-inherents = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
soil-state-machine = { workspace = true, default-features = true }
thiserror = { workspace = true }

[dev-dependencies]
futures = { workspace = true }

[features]
default = []
