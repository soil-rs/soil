[package]
name = "soil-staking"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "A crate which contains primitives that are useful for implementation that uses staking approaches in general. Definitions related to sessions, slashing, etc go here."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"subsoil/std",
]
serde = ["subsoil/serde"]
runtime-benchmarks = ["subsoil/runtime-benchmarks"]
