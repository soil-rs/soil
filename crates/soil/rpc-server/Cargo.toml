[package]
name = "soil-rpc-server"
version = "11.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate RPC servers."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
dyn-clone = { workspace = true, optional = true}
forwarded-header-value = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
governor = { workspace = true, optional = true}
http = { workspace = true, optional = true}
http-body-util = { workspace = true, optional = true}
hyper = { workspace = true, optional = true}
ip_network = { workspace = true, optional = true}
jsonrpsee = { features = ["server"], workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
soil-rpc-api = { workspace = true, optional = true}
serde = { workspace = true, optional = true}
serde_json = { workspace = true, default-features = true, optional = true}
tokio = { features = ["parking_lot"], workspace = true, default-features = true, optional = true}
tower = { workspace = true, features = ["util"], optional = true}
tower-http = { workspace = true, features = ["cors"], optional = true}

[features]
default = ["std"]
std = [
	"dyn-clone",
	"forwarded-header-value",
	"futures",
	"governor",
	"http",
	"http-body-util",
	"hyper",
	"ip_network",
	"jsonrpsee",
	"log",
	"prometheus-endpoint",
	"serde",
	"serde_json",
	"soil-rpc-api",
	"tokio",
	"tower",
	"tower-http",
]
