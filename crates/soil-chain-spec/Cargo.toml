[package]
name = "soil-chain-spec"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate chain configurations."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
soil-client = { workspace = true, default-features = true }
array-bytes = { workspace = true, default-features = true}
clap = { features = ["derive"], optional = true, workspace = true }
codec = { features = ["derive"], workspace = true}
docify = { workspace = true}
memmap2 = { workspace = true}
soil-chain-spec-derive = { workspace = true, default-features = true}
soil-network = { workspace = true, default-features = true}
soil-telemetry = { workspace = true, default-features = true}
serde = { features = ["derive"], workspace = true, default-features = true}
serde_json = { workspace = true, default-features = true}
subsoil-crypto-hashing = { workspace = true, default-features = true}
subsoil = { workspace = true, default-features = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
regex = { workspace = true }
soil-test-node-runtime = { workspace = true }
