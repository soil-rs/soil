[package]
name = "plant-offences-benchmarking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME offences pallet benchmarking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-benchmarking = { workspace = true }
plant-election-provider = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
plant-babe = { workspace = true }
plant-balances = { workspace = true }
plant-grandpa = { workspace = true }
plant-im-online = { workspace = true }
plant-offences = { workspace = true }
plant-session = { workspace = true }
plant-session-benchmarking = { workspace = true }
plant-staking = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
[dev-dependencies]
plant-staking-macros = { workspace = true, default-features = true }
plant-timestamp = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"plant-election-provider/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"plant-babe/std",
	"plant-balances/std",
	"plant-grandpa/std",
	"plant-im-online/std",
	"plant-offences/std",
	"plant-session-benchmarking/std",
	"plant-session/std",
	"plant-staking/std",
	"plant-timestamp/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"plant-election-provider/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"plant-babe/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-grandpa/runtime-benchmarks",
	"plant-im-online/runtime-benchmarks",
	"plant-offences/runtime-benchmarks",
	"plant-session-benchmarking/runtime-benchmarks",
	"plant-session/runtime-benchmarks",
	"plant-staking/runtime-benchmarks",
	"plant-timestamp/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
