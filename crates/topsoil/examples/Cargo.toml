[package]
name = "topsoil-examples"
version = "4.0.0-dev"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "The single package with examples of various types of FRAME pallets"
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
topsoil-default-config-example = { workspace = true }
topsoil-dev-mode = { workspace = true }
topsoil-example-authorization-tx-extension = { workspace = true }
topsoil-example-basic = { workspace = true }
topsoil-example-frame-crate = { workspace = true }
topsoil-example-kitchensink = { workspace = true }
topsoil-example-offchain-worker = { workspace = true }
topsoil-example-single-block-migrations = { workspace = true }
topsoil-example-split = { workspace = true }

[features]
default = ["std"]
std = [
	"topsoil-default-config-example/std",
	"topsoil-dev-mode/std",
	"topsoil-example-authorization-tx-extension/std",
	"topsoil-example-basic/std",
	"topsoil-example-frame-crate/std",
	"topsoil-example-kitchensink/std",
	"topsoil-example-offchain-worker/std",
	"topsoil-example-single-block-migrations/std",
	"topsoil-example-split/std",
]
try-runtime = [
	"topsoil-default-config-example/try-runtime",
	"topsoil-dev-mode/try-runtime",
	"topsoil-example-authorization-tx-extension/try-runtime",
	"topsoil-example-basic/try-runtime",
	"topsoil-example-kitchensink/try-runtime",
	"topsoil-example-offchain-worker/try-runtime",
	"topsoil-example-single-block-migrations/try-runtime",
	"topsoil-example-split/try-runtime",
]
