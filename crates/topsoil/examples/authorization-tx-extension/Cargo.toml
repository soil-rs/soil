[package]
name = "topsoil-example-authorization-tx-extension"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME example authorization transaction extension pallet"
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
docify = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { features = ["experimental"], workspace = true }
topsoil-system = { workspace = true }


[dev-dependencies]
topsoil-verify-signature = { workspace = true }
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-verify-signature/std",
	"scale-info/std",
	"subsoil/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-verify-signature/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-verify-signature/try-runtime",
	"subsoil/try-runtime",
]
