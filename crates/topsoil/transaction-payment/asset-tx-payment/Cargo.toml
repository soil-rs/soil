[package]
name = "topsoil-asset-tx-payment"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "pallet to manage transaction payments in assets"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# Substrate dependencies
soil-io = { workspace = true }
soil-runtime = { workspace = true }

topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
topsoil-transaction-payment = { workspace = true }

# Other dependencies
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }

[dev-dependencies]
topsoil-assets = { workspace = true, default-features = true }
topsoil-authorship = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"topsoil-transaction-payment/std",
	"scale-info/std",
	"serde",
	"soil-io/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-assets/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-transaction-payment/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-assets/try-runtime",
	"topsoil-authorship/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-transaction-payment/try-runtime",
	"soil-runtime/try-runtime",
]
