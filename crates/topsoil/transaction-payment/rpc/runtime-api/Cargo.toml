[package]
name = "topsoil-transaction-payment-rpc-runtime-api"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "RPC runtime API for transaction payment FRAME pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-transaction-payment = { workspace = true }
soil-api = { workspace = true }
soil-runtime = { workspace = true }
soil-weights = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-transaction-payment/std",
	"soil-api/std",
	"soil-runtime/std",
	"soil-weights/std",
]
