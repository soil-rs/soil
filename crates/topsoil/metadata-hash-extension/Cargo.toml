[package]
name = "topsoil-metadata-hash-extension"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME signed extension for verifying the metadata hash"

[dependencies]
array-bytes = { workspace = true, default-features = true }
codec = { features = ["derive"], workspace = true }
const-hex = { workspace = true }
docify = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
frame-metadata = { features = ["current", "unstable"], workspace = true, default-features = true }
merkleized-metadata = { workspace = true }
subsoil = { workspace = true, default-features = true }
soil-transaction-pool = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
substrate-wasm-builder = { features = ["metadata-hash"], workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"const-hex/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"scale-info/std",
	"subsoil/std"]
