[package]
name = "topsoil-state-trie-migration"
version = "29.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet migration of trie"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
remote-externalities = { optional = true, workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }
substrate-state-trie-migration-rpc = { optional = true, workspace = true, default-features = true }
thousands = { optional = true, workspace = true }
zstd = { optional = true, workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
tokio = { features = ["macros"], workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"scale-info/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking",
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"soil-runtime/try-runtime",
]
remote-test = [
	"remote-externalities",
	"serde",
	"std",
	"substrate-state-trie-migration-rpc",
	"thousands",
	"zstd",
]
