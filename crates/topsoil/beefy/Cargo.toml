[package]
name = "topsoil-beefy"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "BEEFY FRAME pallet"
homepage.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-authorship = { workspace = true }
topsoil-session = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
subsoil = { features = ["serde"], workspace = true }

[dev-dependencies]
plant-election-provider = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-offences = { workspace = true, default-features = true }
plant-staking = { workspace = true, default-features = true }
plant-staking-macros = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"plant-election-provider/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-authorship/std",
	"topsoil-balances/std",
	"topsoil-offences/std",
	"topsoil-session/std",
	"plant-staking/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"serde/std",
	"subsoil/std",
]
try-runtime = [
	"plant-election-provider/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-authorship/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-offences/try-runtime",
	"topsoil-session/try-runtime",
	"plant-staking/try-runtime",
	"topsoil-timestamp/try-runtime",
	"subsoil/try-runtime",
]
