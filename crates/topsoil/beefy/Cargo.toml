[package]
name = "topsoil-beefy"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
repository.workspace = true
description = "BEEFY FRAME pallet"
homepage.workspace = true

[lints]
workspace = true

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-authorship = { workspace = true }
topsoil-session = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
soil-consensus-beefy = { features = ["serde"], workspace = true }
soil-runtime = { features = ["serde"], workspace = true }
soil-session = { workspace = true }
soil-staking = { features = ["serde"], workspace = true }

[dev-dependencies]
topsoil-election-provider-support = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-offences = { workspace = true, default-features = true }
topsoil-staking = { workspace = true, default-features = true }
topsoil-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }
soil-staking = { workspace = true, default-features = true }
soil-state-machine = { workspace = true }
soil-tracing = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-authorship/std",
	"topsoil-balances/std",
	"topsoil-offences/std",
	"topsoil-session/std",
	"topsoil-staking/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"serde/std",
	"soil-consensus-beefy/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-session/std",
	"soil-staking/std",
	"soil-state-machine/std",
]
try-runtime = [
	"topsoil-election-provider-support/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-authorship/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-offences/try-runtime",
	"topsoil-session/try-runtime",
	"topsoil-staking/try-runtime",
	"topsoil-timestamp/try-runtime",
	"soil-runtime/try-runtime",
]
