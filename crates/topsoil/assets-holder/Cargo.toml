[package]
name = "topsoil-assets-holder"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Provides holding features to `pallet-assets`"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-assets = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true }
subsoil = { workspace = true }
soil-io = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-assets/std",
	"topsoil-balances/std",
	"scale-info/std",
	"subsoil/std",
	"soil-io/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-assets/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-assets/try-runtime",
	"topsoil-balances/try-runtime",
	"soil-runtime/try-runtime",
]
