[package]
name = "topsoil-executive"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME executives engine"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
aquamarine = { workspace = true }
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
topsoil-try-runtime = { optional = true, workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-transaction-payment = { workspace = true, default-features = true }
soil-test-node-runtime-client = { workspace = true }

[features]
default = ["std"]
with-tracing = ["subsoil/with-tracing"]
std = [
	"codec/std",
	"topsoil-support/experimental",
	"topsoil-support/std",
	"topsoil-system/std",
	"topsoil-try-runtime/std",
	"log/std",
	"topsoil-balances/std",
	"topsoil-transaction-payment/std",
	"scale-info/std",
	"subsoil/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-try-runtime/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-transaction-payment/try-runtime",
	"subsoil/try-runtime",
]
