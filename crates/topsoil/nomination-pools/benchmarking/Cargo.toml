[package]
name = "topsoil-nomination-pools-benchmarking"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME nomination pools pallet benchmarking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# parity
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

# FRAME
topsoil-benchmarking = { workspace = true }
topsoil-election-provider-support = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
topsoil-bags-list = { workspace = true }
topsoil-delegated-staking = { workspace = true }
topsoil-nomination-pools = { workspace = true }
topsoil-staking = { workspace = true }

# Substrate Primitives
soil-runtime = { workspace = true }
soil-staking = { workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true }
topsoil-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"topsoil-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"topsoil-bags-list/std",
	"topsoil-balances/std",
	"topsoil-delegated-staking/std",
	"topsoil-nomination-pools/std",
	"topsoil-staking/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"subsoil/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-staking/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-election-provider-support/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-bags-list/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-delegated-staking/runtime-benchmarks",
	"topsoil-nomination-pools/runtime-benchmarks",
	"topsoil-staking/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
