[package]
name = "topsoil-benchmarking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Macro for benchmarking a FRAME runtime."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-support = { workspace = true }
topsoil-support-procedural = { workspace = true }
topsoil-system = { workspace = true }
linregress = { optional = true, workspace = true }
log = { workspace = true }
paste = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
soil-api = { workspace = true }
soil-application-crypto = { workspace = true }
soil-runtime = { workspace = true }
subsoil = { workspace = true }
static_assertions = { workspace = true, default-features = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
rusty-fork = { workspace = true }
soil-client-db = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support-procedural/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"linregress",
	"log/std",
	"scale-info/std",
	"serde",
	"soil-api/std",
	"soil-application-crypto/std",
	"subsoil/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"soil-client-db/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
