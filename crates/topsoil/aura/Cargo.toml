[package]
name = "topsoil-aura"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME AURA consensus pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive", "max-encoded-len"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-timestamp = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"subsoil/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-timestamp/try-runtime",
	"subsoil/try-runtime",
]
