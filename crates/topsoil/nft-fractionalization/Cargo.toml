[package]
name = "topsoil-nft-fractionalization"
version = "10.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet to convert non-fungible to fungible tokens."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
log = { workspace = true }
topsoil-assets = { workspace = true }
topsoil-nfts = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil/std",
	"log/std",
	"topsoil-assets/std",
	"topsoil-balances/std",
	"topsoil-nfts/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"topsoil-assets/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-nfts/runtime-benchmarks",
]
try-runtime = [
	"topsoil/try-runtime",
	"topsoil-assets/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-nfts/try-runtime",
]
