[package]
name = "topsoil-fast-unstake"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME fast unstake pallet"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

topsoil-support = { workspace = true }
topsoil-system = { workspace = true }

topsoil-election-provider-support = { workspace = true }
soil-runtime = { workspace = true }
soil-staking = { workspace = true }

topsoil-benchmarking = { optional = true, workspace = true }

docify = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }
topsoil-staking = { workspace = true, default-features = true }
topsoil-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"topsoil-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"topsoil-staking/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"subsoil/std",
	"soil-runtime/std",
	"soil-staking/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-election-provider-support/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-staking/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
try-runtime = [
	"topsoil-election-provider-support/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-staking/try-runtime",
	"topsoil-timestamp/try-runtime",
	"soil-runtime/try-runtime",
]
