[package]
name = "topsoil-staking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet staking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-election-provider-support = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-authorship = { workspace = true }
topsoil-session = { features = ["historical"], workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }
soil-application-crypto = { features = ["serde"], workspace = true }
soil-io = { workspace = true }
soil-runtime = { features = ["serde"], workspace = true }
soil-staking = { features = ["serde"], workspace = true }

# Optional imports for benchmarking
topsoil-benchmarking = { optional = true, workspace = true }
rand_chacha = { optional = true, workspace = true }

[dev-dependencies]
topsoil-benchmarking = { workspace = true, default-features = true }
topsoil-election-provider-support = { workspace = true, default-features = true }
topsoil-support = { features = ["experimental"], workspace = true, default-features = true }
topsoil-bags-list = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
rand_chacha = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-npos-elections = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }
substrate-test-utils = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-authorship/std",
	"topsoil-bags-list/std",
	"topsoil-balances/std",
	"topsoil-session/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"serde/std",
	"soil-application-crypto/std",
	"soil-io/std",
	"soil-npos-elections/std",
	"soil-runtime/std",
	"soil-staking/std",
	"soil-tracing/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-election-provider-support/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-bags-list/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-session/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"rand_chacha",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
try-runtime = [
	"topsoil-election-provider-support/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-authorship/try-runtime",
	"topsoil-bags-list/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-session/try-runtime",
	"topsoil-timestamp/try-runtime",
	"soil-runtime/try-runtime",
]
