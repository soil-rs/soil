[package]
name = "topsoil-beefy-mmr"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
description = "BEEFY + MMR runtime utilities"
repository.workspace = true
homepage.workspace = true

[lints]
workspace = true

[dependencies]
array-bytes = { optional = true, workspace = true, default-features = true }
subsoil = { workspace = true }
codec = { features = ["derive"], workspace = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-beefy = { workspace = true }
topsoil-mmr = { workspace = true }
topsoil-session = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
soil-consensus-beefy = { workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
topsoil-balances = { workspace = true }
soil-staking = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"array-bytes",
	"subsoil/std",
	"codec/std",
	"topsoil-benchmarking/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"topsoil-beefy/std",
	"topsoil-mmr/std",
	"topsoil-session/std",
	"scale-info/std",
	"serde",
	"soil-consensus-beefy/std",
	"subsoil/std",
	"soil-staking/std"]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-beefy/try-runtime",
	"topsoil-mmr/try-runtime",
	"topsoil-session/try-runtime",
	"subsoil/try-runtime"]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-mmr/runtime-benchmarks",
	"topsoil-session/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
	"soil-staking/runtime-benchmarks"]
