[package]
name = "topsoil-election-provider-support-benchmarking"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Benchmarking for election provider support onchain config trait"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-election-provider-support = { workspace = true }
topsoil-system = { workspace = true }
soil-npos-elections = { workspace = true }
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-election-provider-support/std",
	"topsoil-system/std",
	"soil-npos-elections/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-election-provider-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
