[package]
name = "topsoil-election-provider-support"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "election provider supporting traits"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-election-provider-solution-type = { workspace = true, default-features = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }


[dev-dependencies]
rand = { features = ["small_rng"], workspace = true, default-features = true }

[features]
default = ["std"]
fuzz = ["default"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"scale-info/std",
	"subsoil/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"subsoil/try-runtime",
]
