[package]
name = "topsoil-origin-restriction"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Pallet to give some execution allowance for some origins"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, features = ["derive"] }
topsoil-benchmarking = { workspace = true, optional = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-transaction-payment = { workspace = true }
scale-info = { workspace = true, features = ["derive"] }
subsoil = { workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-transaction-payment/std",
	"scale-info/std",
	"subsoil/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-transaction-payment/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-transaction-payment/try-runtime",
	"soil-runtime/try-runtime",
]
