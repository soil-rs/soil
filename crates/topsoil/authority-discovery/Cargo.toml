[package]
name = "topsoil-authority-discovery"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for authority discovery"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
topsoil-session = { features = ["historical"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-authority-discovery = { workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true }
subsoil = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"topsoil-balances/std",
	"topsoil-session/std",
	"scale-info/std",
	"subsoil/std",
	"soil-authority-discovery/std",
	"subsoil/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-session/try-runtime",
	"subsoil/try-runtime",
]
