[package]
name = "topsoil-offences"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME offences pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
soil-runtime = { workspace = true }
soil-staking = { workspace = true }

[dev-dependencies]
soil-core = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"scale-info/std",
	"serde",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-staking/std",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"soil-runtime/try-runtime",
]
