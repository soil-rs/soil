[package]
name = "topsoil-offences-benchmarking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME offences pallet benchmarking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-benchmarking = { workspace = true }
plant-election-provider-support = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-babe = { workspace = true }
topsoil-balances = { workspace = true }
topsoil-grandpa = { workspace = true }
topsoil-im-online = { workspace = true }
topsoil-offences = { workspace = true }
topsoil-session = { workspace = true }
topsoil-session-benchmarking = { workspace = true }
plant-staking = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
[dev-dependencies]
plant-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"plant-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-babe/std",
	"topsoil-balances/std",
	"topsoil-grandpa/std",
	"topsoil-im-online/std",
	"topsoil-offences/std",
	"topsoil-session-benchmarking/std",
	"topsoil-session/std",
	"plant-staking/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"plant-election-provider-support/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-babe/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-grandpa/runtime-benchmarks",
	"topsoil-im-online/runtime-benchmarks",
	"topsoil-offences/runtime-benchmarks",
	"topsoil-session-benchmarking/runtime-benchmarks",
	"topsoil-session/runtime-benchmarks",
	"plant-staking/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
