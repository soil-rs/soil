[package]
name = "topsoil-support-test"
version = "3.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-benchmarking = { workspace = true }
topsoil-executive = { workspace = true }
frame-metadata = { features = ["current", "unstable"], workspace = true }
topsoil-support = { features = ["experimental"], workspace = true }
topsoil-system = { workspace = true }
pretty_assertions = { workspace = true }
rustversion = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }
subsoil = { workspace = true }
soil-state-machine = { optional = true, workspace = true, default-features = true }
soil-version = { workspace = true }
static_assertions = { workspace = true, default-features = true }
trybuild = { features = ["diff"], workspace = true }
# The "std" feature for this pallet is never activated on purpose, in order to test construct_runtime error message
test-pallet = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"topsoil-executive/std",
	"frame-metadata/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"scale-info/std",
	"serde/std",
	"soil-api/std",
	"subsoil/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-state-machine/std",
	"soil-version/std",
	"test-pallet/std",
]
experimental = ["topsoil-support/experimental", "topsoil-system/experimental"]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-executive/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"soil-runtime/try-runtime",
]
# WARNING:
# Only CI runs with this feature enabled. This feature is for testing stuff related to the FRAME macros
# in conjunction with rust features.
frame-feature-testing = []
frame-feature-testing-2 = []
# Disable ui tests
disable-ui-tests = []
no-metadata-docs = ["topsoil-support/no-metadata-docs"]
