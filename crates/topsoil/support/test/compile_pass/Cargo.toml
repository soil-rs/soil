[package]
name = "topsoil-support-test-compile-pass"
version = "4.0.0-dev"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }
soil-runtime = { workspace = true }
soil-version = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"scale-info/std",
	"subsoil/std",
	"soil-runtime/std",
	"soil-version/std",
]
