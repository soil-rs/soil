[package]
name = "topsoil-support"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Support code for the runtime."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { workspace = true }
bitflags = { workspace = true }
codec = { features = ["derive", "max-encoded-len"], workspace = true }
docify = { workspace = true }
environmental = { workspace = true }
frame-metadata = { features = ["current", "unstable"], workspace = true }
topsoil-support-procedural = { workspace = true }
impl-trait-for-tuples = { workspace = true }
k256 = { features = ["ecdsa"], workspace = true }
log = { workspace = true }
macro_magic = { workspace = true }
paste = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }
serde_json = { features = ["alloc"], workspace = true }
soil-api = { features = ["frame-metadata"], workspace = true }
subsoil-crypto-hashing-proc-macro = { workspace = true, default-features = true }
subsoil-debug-derive = { workspace = true }
soil-genesis-builder = { workspace = true }
soil-inherents = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { features = ["serde"], workspace = true }
soil-staking = { workspace = true }
soil-state-machine = { optional = true, workspace = true }
subsoil = { workspace = true }
soil-trie = { workspace = true }
tt-call = { workspace = true }

aquamarine = { workspace = true }

[dev-dependencies]
Inflector = { workspace = true }
topsoil-system = { workspace = true, default-features = true }
pretty_assertions = { workspace = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
soil-timestamp = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"environmental/std",
	"frame-metadata/std",
	"topsoil-support-procedural/std",
	"topsoil-system/std",
	"k256/std",
	"log/std",
	"scale-info/std",
	"serde/std",
	"serde_json/std",
	"soil-api/std",
	"subsoil/std",
	"subsoil-debug-derive/std",
	"soil-genesis-builder/std",
	"soil-inherents/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-staking/std",
	"soil-state-machine/std",
	"soil-trie/std",
]
runtime-benchmarks = [
	"topsoil-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
try-runtime = [
	"topsoil-system/try-runtime",
	"soil-runtime/try-runtime",
]
experimental = ["topsoil-support-procedural/experimental"]
# By default some types have documentation, `no-metadata-docs` allows to reduce the documentation
# in the metadata.
no-metadata-docs = [
	"topsoil-support-procedural/no-metadata-docs",
	"soil-api/no-metadata-docs",
]
# By default some types have documentation, `full-metadata-docs` allows to add documentation to
# more types in the metadata.
full-metadata-docs = ["scale-info/docs"]
# Generate impl-trait for tuples with the given number of tuples. Will be needed as the number of
# pallets in a runtime grows. Does increase the compile time!
tuples-96 = ["topsoil-support-procedural/tuples-96"]
tuples-128 = ["topsoil-support-procedural/tuples-128"]
