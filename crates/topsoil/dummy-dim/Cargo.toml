[package]
name = "topsoil-dummy-dim"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Dummy DIM Pallet"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, features = ["derive"] }
topsoil-benchmarking = { workspace = true, optional = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
scale-info = { workspace = true, features = ["derive"] }
soil-api = { workspace = true }
subsoil = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
topsoil-people = { workspace = true }
verifiable = { workspace = true, features = ["small-ring"] }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-people/std",
	"scale-info/std",
	"soil-api/std",
	"subsoil/std",
	"soil-runtime/std",
	"verifiable/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-people/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-people/try-runtime",
	"soil-runtime/try-runtime",
]
