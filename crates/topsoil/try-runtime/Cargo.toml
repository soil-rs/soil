[package]
name = "topsoil-try-runtime"
version = "0.34.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Supporting types for try-runtime, testing and dry-running commands."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
soil-api = { workspace = true }
soil-runtime = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"soil-api/std",
	"soil-runtime/std",
]
try-runtime = ["topsoil-support/try-runtime", "soil-runtime/try-runtime"]
