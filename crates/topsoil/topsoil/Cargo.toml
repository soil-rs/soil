[package]
name = "topsoil"
version = "0.1.0"
authors = ["Parity Technologies <admin@parity.io>"]
edition.workspace = true
license.workspace = true
homepage = "https://paritytech.github.io"
repository.workspace = true
description = "The single package to get you started with building frame pallets and runtimes"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# external deps
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { workspace = true }

# primitive deps, used for developing FRAME pallets.
subsoil = { workspace = true }

# frame deps, for developing FRAME pallets.
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }

# primitive types used for developing FRAME runtimes.
soil-block-builder = { optional = true, workspace = true }
soil-consensus-aura = { optional = true, workspace = true }
soil-consensus-grandpa = { optional = true, workspace = true }
soil-genesis-builder = { optional = true, workspace = true }
soil-inherents = { optional = true, workspace = true }
soil-offchain = { optional = true, workspace = true }
soil-session = { optional = true, workspace = true }
soil-transaction-pool = { optional = true, workspace = true }

topsoil-executive = { optional = true, workspace = true }
topsoil-system-rpc-runtime-api = { optional = true, workspace = true }

# Used for runtime benchmarking
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-system-benchmarking = { optional = true, workspace = true }

# Used for try-runtime
topsoil-try-runtime = { optional = true, workspace = true }

docify = { workspace = true }
log = { workspace = true }

[features]
default = ["runtime", "std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-executive?/std",
	"topsoil-support/std",
	"topsoil-system-benchmarking?/std",
	"topsoil-system-rpc-runtime-api?/std",
	"topsoil-system/std",
	"topsoil-try-runtime?/std",
	"log/std",
	"scale-info/std",
	"serde/std",
	"subsoil/std",
	"soil-block-builder?/std",
	"soil-consensus-aura?/std",
	"soil-consensus-grandpa?/std",
	"soil-genesis-builder?/std",
	"soil-inherents?/std",
	"soil-offchain?/std",
	"subsoil/std",
	"soil-session?/std",
	"soil-transaction-pool?/std"]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system-benchmarking/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"subsoil/runtime-benchmarks"]
try-runtime = [
	"topsoil-executive/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-try-runtime/try-runtime",
	"subsoil/try-runtime"]
experimental = ["topsoil-support/experimental"]
runtime = [
	"topsoil-executive",
	"topsoil-system-rpc-runtime-api",
	"soil-block-builder",
	"soil-consensus-aura",
	"soil-consensus-grandpa",
	"soil-genesis-builder",
	"soil-inherents",
	"soil-offchain",
	"soil-session",
	"soil-transaction-pool"]
