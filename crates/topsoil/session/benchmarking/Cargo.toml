[package]
name = "topsoil-session-benchmarking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME sessions pallet benchmarking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-benchmarking = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
topsoil-session = { workspace = true }
plant-staking = { workspace = true }
rand = { features = ["std_rng"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
codec = { features = ["derive"], workspace = true, default-features = true }
plant-election-provider-support = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
plant-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }
scale-info = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
[features]
default = ["std"]
std = [
	"topsoil-benchmarking/std",
	"plant-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"topsoil-session/std",
	"plant-staking/std",
	"rand/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"plant-election-provider-support/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-session/runtime-benchmarks",
	"plant-staking/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
