[package]
name = "topsoil-session"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME sessions pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true }
topsoil-balances = { workspace = true }
topsoil-timestamp = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
subsoil = { features = ["serde"], workspace = true }
soil-io = { workspace = true }
soil-runtime = { features = ["serde"], workspace = true }
soil-session = { workspace = true }
soil-staking = { features = ["serde"], workspace = true }
soil-state-machine = { workspace = true }
soil-trie = { optional = true, workspace = true }

[features]
default = ["historical", "std"]
historical = ["soil-trie"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"subsoil/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-session/std",
	"soil-staking/std",
	"soil-state-machine/std",
	"soil-trie/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-timestamp/try-runtime",
	"soil-runtime/try-runtime",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
