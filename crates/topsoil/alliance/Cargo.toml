[package]
name = "topsoil-alliance"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "The Alliance pallet provides a collective for standard-setting industry collaboration."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { optional = true, workspace = true, default-features = true }
log = { workspace = true }

codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

soil-core = { workspace = true }
soil-crypto-hashing = { optional = true, workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }

topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }

topsoil-collective = { optional = true, workspace = true }
topsoil-identity = { workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-collective = { workspace = true, default-features = true }
soil-crypto-hashing = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"topsoil-collective?/std",
	"topsoil-identity/std",
	"scale-info/std",
	"soil-core/std",
	"soil-crypto-hashing?/std",
	"soil-io/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"array-bytes",
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-collective/runtime-benchmarks",
	"topsoil-identity/runtime-benchmarks",
	"soil-crypto-hashing",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-collective?/try-runtime",
	"topsoil-identity/try-runtime",
	"soil-runtime/try-runtime",
]
