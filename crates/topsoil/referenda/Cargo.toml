[package]
name = "topsoil-referenda"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for inclusive on-chain decisions"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
assert_matches = { optional = true, workspace = true }
codec = { features = ["derive"], workspace = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], optional = true, workspace = true, default-features = true }
subsoil = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
topsoil-balances = { workspace = true, default-features = true }
topsoil-preimage = { workspace = true, default-features = true }
topsoil-scheduler = { workspace = true, default-features = true }
[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"topsoil-preimage/std",
	"topsoil-scheduler/std",
	"scale-info/std",
	"serde",
	"subsoil/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"assert_matches",
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-preimage/runtime-benchmarks",
	"topsoil-scheduler/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-preimage/try-runtime",
	"topsoil-scheduler/try-runtime",
	"soil-runtime/try-runtime",
]
