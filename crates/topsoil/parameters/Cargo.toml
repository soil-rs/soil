[package]
name = "topsoil-parameters"
description = "Pallet to store and configure parameters."
repository.workspace = true
license.workspace = true
version = "0.1.0"
authors = ["Acala Developers", "Parity Technologies <admin@parity.io>"]
edition.workspace = true

[dependencies]
codec = { features = ["max-encoded-len"], workspace = true }
docify = { workspace = true }
paste = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], optional = true, workspace = true, default-features = true }

topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { features = ["experimental"], workspace = true }
topsoil-system = { workspace = true }
subsoil = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }
topsoil-example-basic = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"scale-info/std",
	"serde",
	"subsoil/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"topsoil-example-basic/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"topsoil-example-basic/try-runtime",
	"soil-runtime/try-runtime",
]
