[package]
name = "topsoil-root-testing"
version = "4.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME root testing pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"scale-info/std",
	"soil-io/std",
	"soil-runtime/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"soil-runtime/try-runtime",
]
