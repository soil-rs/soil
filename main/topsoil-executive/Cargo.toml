[package]
name = "topsoil-executive"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Topsoil executives engine"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
aquamarine = { workspace = true }
codec = { features = ["derive"], workspace = true }
topsoil-core = { workspace = true }
topsoil-try-runtime = { optional = true, workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
plant-balances = { workspace = true, default-features = true }
plant-transaction-payment = { workspace = true, default-features = true }
soil-test-node-runtime-client = { workspace = true }

[features]
default = ["std"]
with-tracing = ["subsoil/with-tracing"]
std = [
	"codec/std",
	"topsoil-core/experimental",
	"topsoil-core/std",
	"topsoil-try-runtime/std",
	"log/std",
	"plant-balances/std",
	"plant-transaction-payment/std",
	"scale-info/std",
	"subsoil/std",
]
try-runtime = [
	"topsoil-core/try-runtime",
	"topsoil-try-runtime/try-runtime",
	"plant-balances/try-runtime",
	"plant-transaction-payment/try-runtime",
	"subsoil/try-runtime",
]
