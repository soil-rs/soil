[package]
name = "topsoil-try-runtime"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Supporting types for try-runtime, testing and dry-running commands."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-core = { workspace = true }
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-core/std",
	"subsoil/std"]
try-runtime = ["topsoil-core/try-runtime", "subsoil/try-runtime"]
