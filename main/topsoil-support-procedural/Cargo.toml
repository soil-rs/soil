[package]
name = "topsoil-support-procedural"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Proc macro of Support code for the runtime."
autoexamples = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[lib]
proc-macro = true

[dependencies]
Inflector = { workspace = true }
cfg-expr = { workspace = true }
derive-syn-parse = { workspace = true }
docify = { workspace = true }
expander = { workspace = true }
topsoil-support-procedural-tools = { workspace = true, default-features = true }
itertools = { workspace = true }
macro_magic = { features = ["proc_support"], workspace = true }
proc-macro-warning = { workspace = true }
proc-macro2 = { workspace = true }
quote = { workspace = true }
subsoil-crypto-hashing = { workspace = true }
syn = { features = ["full", "parsing", "visit-mut"], workspace = true }

[dev-dependencies]
regex = { workspace = true }

[features]
default = ["std"]
std = [
	"subsoil-crypto-hashing/std",
]
no-metadata-docs = []
experimental = []
# Generate impl-trait for tuples with the given number of tuples. Will be needed as the number of
# pallets in a runtime grows. Does increase the compile time!
tuples-96 = []
tuples-128 = []
