[package]
name = "soil-manual-seal"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Manual sealing engine for Soil"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
subsoil = { workspace = true }
async-trait = { workspace = true, optional = true}
codec = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
futures-timer = { workspace = true, optional = true}
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
soil-prometheus = { workspace = true, default-features = true, optional = true}
soil-consensus = { workspace = true, default-features = true, optional = true}
soil-aura = { workspace = true, default-features = true, optional = true}
soil-babe = { workspace = true, default-features = true, optional = true}
soil-txpool = { workspace = true, default-features = true, optional = true}
serde = { features = ["derive"], workspace = true, default-features = true, optional = true}
soil-client = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"async-trait",
	"codec",
	"futures",
	"futures-timer",
	"jsonrpsee",
	"log",
	"soil-prometheus",
	"soil-consensus",
	"soil-aura",
	"soil-babe",
	"soil-txpool",
	"serde",
	"soil-client",
	"thiserror",
	"subsoil/std"]

[dev-dependencies]
assert_matches = { workspace = true }
soil-service = { workspace = true, default-features = true }
soil-test-node-runtime-client = { workspace = true }
soil-test-node-runtime-txpool = { workspace = true }
tokio = { features = ["macros", "rt-multi-thread"], workspace = true, default-features = true }
