[package]
name = "soil-service"
version = "0.35.0"
authors.workspace = true
build = "build.rs"
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Substrate service. Starts a thread that spins up the network, client, and extrinsic pool. Manages communication between them."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true}
codec = { workspace = true, default-features = true}
console = { workspace = true, default-features = true}
derive_more = { workspace = true, default-features = true}
directories = { workspace = true}
exit-future = { workspace = true}
futures = { workspace = true}
futures-timer = { workspace = true}
jsonrpsee = { features = ["server"], workspace = true}
libc = { workspace = true, default-features = true}
log = { workspace = true, default-features = true}
parking_lot = { workspace = true, default-features = true}
pin-project = { workspace = true}
soil-prometheus = { workspace = true, default-features = true}
rand = { workspace = true, default-features = true}
rand_pcg = { workspace = true, default-features = true}
regex = { workspace = true, default-features = true}
soil-chain-spec = { workspace = true, default-features = true}
soil-network = { workspace = true, default-features = true}
soil-rpc = { workspace = true, default-features = true }
soil-telemetry = { workspace = true, default-features = true}
soil-txpool = { workspace = true, default-features = true}
schnellru = { workspace = true}
serde = { workspace = true, default-features = true}
serde_json = { workspace = true, default-features = true}
soil-client = { workspace = true, default-features = true}
subsoil = { workspace = true, default-features = true}
subsoil-crypto-hashing = { workspace = true, default-features = true}
soil-transaction-storage-proof = { workspace = true, default-features = true}
static_init = { workspace = true}
tempfile = { workspace = true}
thiserror = { workspace = true}
tokio = { features = ["parking_lot", "rt-multi-thread", "time"], workspace = true, default-features = true}
tracing = { workspace = true, default-features = true}
tracing-futures = { workspace = true}

[dev-dependencies]
soil-test-node-runtime = { workspace = true }
soil-test-node-runtime-client = { workspace = true }

[features]
default = ["rocksdb"]
# The RocksDB feature activates the RocksDB database backend. If it is not activated, and you pass
# a path to a database, an error will be produced at runtime.
rocksdb = ["soil-client/rocksdb"]
runtime-benchmarks = [
	"soil-client/runtime-benchmarks",
	"subsoil/runtime-benchmarks"]
jemalloc-allocator = ["soil-client/jemalloc-allocator"]
