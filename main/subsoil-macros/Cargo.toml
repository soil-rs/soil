[package]
name = "subsoil-macros"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Unified procedural macros for the Subsoil primitives"

[lints]
workspace = true

[lib]
proc-macro = true

[dependencies]
Inflector = { workspace = true }
blake2 = { workspace = true, default-features = true }
codec = { features = ["derive"], workspace = true, default-features = true }
expander = { workspace = true }
proc-macro-crate = { workspace = true }
proc-macro-warning = { workspace = true }
proc-macro2 = { workspace = true }
quote = { features = ["proc-macro"], workspace = true }
subsoil-crypto-hashing = { workspace = true }
syn = { features = ["extra-traits", "fold", "full", "parsing", "proc-macro", "visit", "visit-mut"], workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }

[features]
no-metadata-docs = []
