[package]
name = "soil-txpool"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Soil transaction pool implementation"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "basics"
harness = false

[dependencies]
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
futures = { workspace = true }
futures-timer = { workspace = true }
indexmap = { workspace = true }
itertools = { workspace = true }
linked-hash-map = { workspace = true }
parking_lot = { workspace = true, default-features = true }
soil-prometheus = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }
soil-client = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
strum = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }
tokio = { workspace = true, default-features = true, features = ["macros", "time"] }
tokio-stream = { workspace = true }
tracing = { workspace = true, default-features = true }

[dev-dependencies]
anyhow = { workspace = true }
assert_matches = { workspace = true }
chrono = { workspace = true }
criterion = { workspace = true, default-features = true }
env_logger = { workspace = true }
rstest = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
soil-test-node-runtime = { workspace = true }
soil-test-node-runtime-client = { workspace = true }
soil-test-node-runtime-txpool = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tracing-subscriber = { workspace = true }
