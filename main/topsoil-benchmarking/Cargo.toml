[package]
name = "topsoil-benchmarking"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Macro for benchmarking a Topsoil runtime."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-core = { workspace = true }
topsoil-core-procedural = { workspace = true }
linregress = { optional = true, workspace = true }
log = { workspace = true }
paste = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, workspace = true, default-features = true }
subsoil = { workspace = true }
static_assertions = { workspace = true, default-features = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
rusty-fork = { workspace = true }
soil-client = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-core-procedural/std",
	"topsoil-core/std",
	"linregress",
	"log/std",
	"scale-info/std",
	"serde",
	"subsoil/std"]
runtime-benchmarks = [
	"topsoil-core/runtime-benchmarks",
	"soil-client/runtime-benchmarks",
	"subsoil/runtime-benchmarks"]
