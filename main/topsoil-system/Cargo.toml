[package]
name = "topsoil-system"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Topsoil system module"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bench]]
name = "bench"
harness = false

[dependencies]
cfg-if = { workspace = true }
codec = { features = ["derive"], workspace = true }
docify = { workspace = true }
topsoil-support = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
serde = { features = ["alloc", "derive"], workspace = true }
subsoil = { features = ["serde"], workspace = true }

[dev-dependencies]
criterion = { workspace = true, default-features = true }
soil-test-node-runtime-client = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"log/std",
	"scale-info/std",
	"serde/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = ["topsoil-support/try-runtime", "subsoil/try-runtime"]
experimental = ["topsoil-support/experimental"]
