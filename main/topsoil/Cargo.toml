[package]
name = "topsoil"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "The single package to get you started with building frame pallets and runtimes"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# external deps
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { workspace = true }

# primitive deps, used for developing FRAME pallets.
subsoil = { workspace = true }

# frame deps, for developing FRAME pallets.
topsoil-core = { workspace = true }

topsoil-executive = { optional = true, workspace = true }
topsoil-core-rpc-runtime-api = { optional = true, workspace = true }

# Used for runtime benchmarking
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-core-system-benchmarking = { optional = true, workspace = true }

# Used for try-runtime
topsoil-try-runtime = { optional = true, workspace = true }

docify = { workspace = true }
log = { workspace = true }

[features]
default = ["runtime", "std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-executive?/std",
	"topsoil-core/std",
	"topsoil-core-system-benchmarking?/std",
	"topsoil-core-rpc-runtime-api?/std",
	"topsoil-try-runtime?/std",
	"log/std",
	"scale-info/std",
	"serde/std",
	"subsoil/std"]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-core/runtime-benchmarks",
	"topsoil-core-system-benchmarking/runtime-benchmarks",
	"subsoil/runtime-benchmarks"]
try-runtime = [
	"topsoil-executive/try-runtime",
	"topsoil-core/try-runtime",
	"topsoil-try-runtime/try-runtime",
	"subsoil/try-runtime"]
experimental = ["topsoil-core/experimental"]
runtime = [
	"topsoil-executive",
	"topsoil-core-rpc-runtime-api"]
