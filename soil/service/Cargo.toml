[package]
name = "soil-service"
version = "0.35.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Substrate service. Starts a thread that spins up the network, client, and extrinsic pool. Manages communication between them."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
directories = { workspace = true }
exit-future = { workspace = true }
futures = { workspace = true }
futures-timer = { workspace = true }
jsonrpsee = { features = ["server"], workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
pin-project = { workspace = true }
prometheus-endpoint = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
soil-chain-spec = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
soil-client-db = { workspace = true }
sc-consensus = { workspace = true, default-features = true }
soil-executor = { workspace = true, default-features = true }
soil-informant = { workspace = true, default-features = true }
sc-keystore = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-network-common = { workspace = true, default-features = true }
soil-network-light = { workspace = true, default-features = true }
soil-network-sync = { workspace = true, default-features = true }
soil-network-transactions = { workspace = true, default-features = true }
soil-network-types = { workspace = true, default-features = true }
sc-rpc = { workspace = true, default-features = true }
soil-rpc-server = { workspace = true, default-features = true }
soil-rpc-spec-v2 = { workspace = true, default-features = true }
soil-sysinfo = { workspace = true, default-features = true }
soil-telemetry = { workspace = true, default-features = true }
sc-tracing = { workspace = true, default-features = true }
sc-transaction-pool = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
soil-utils = { workspace = true, default-features = true }
schnellru = { workspace = true }
serde = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-externalities = { workspace = true, default-features = true }
soil-keystore = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
soil-session = { workspace = true, default-features = true }
soil-state-machine = { workspace = true, default-features = true }
soil-storage = { workspace = true, default-features = true }
soil-transaction-pool = { workspace = true, default-features = true }
soil-transaction-storage-proof = { workspace = true, default-features = true }
soil-trie = { workspace = true, default-features = true }
soil-version = { workspace = true, default-features = true }
static_init = { workspace = true }
tempfile = { workspace = true }
thiserror = { workspace = true }
tokio = { features = ["parking_lot", "rt-multi-thread", "time"], workspace = true, default-features = true }
tracing = { workspace = true, default-features = true }
tracing-futures = { workspace = true }

[dev-dependencies]
substrate-test-runtime = { workspace = true }
substrate-test-runtime-client = { workspace = true }

[features]
std = []
default = ["std", "rocksdb"]
# The RocksDB feature activates the RocksDB database backend. If it is not activated, and you pass
# a path to a database, an error will be produced at runtime.
rocksdb = ["soil-client-db/rocksdb"]
runtime-benchmarks = [
	"soil-client-db/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
jemalloc-allocator = ["soil-client-db/jemalloc-allocator"]
