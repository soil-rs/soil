[package]
name = "soil-consensus-manual-seal"
version = "0.35.0"
authors.workspace = true
description = "Manual sealing engine for Substrate"
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { workspace = true }
codec = { workspace = true, default-features = true }
futures = { workspace = true }
futures-timer = { workspace = true }
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true }
log = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
sc-consensus = { workspace = true, default-features = true }
sc-consensus-aura = { workspace = true, default-features = true }
sc-consensus-babe = { workspace = true, default-features = true }
soil-consensus-epochs = { workspace = true, default-features = true }
sc-transaction-pool = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
serde = { features = ["derive"], workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-consensus-aura = { workspace = true, default-features = true }
soil-consensus-babe = { workspace = true, default-features = true }
soil-consensus-slots = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-externalities = { workspace = true, default-features = true }
soil-inherents = { workspace = true, default-features = true }
soil-keystore = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
soil-timestamp = { workspace = true, default-features = true }
soil-trie = { workspace = true, default-features = true }
thiserror = { workspace = true }

[features]
default = ["std"]
std = []

[dev-dependencies]
assert_matches = { workspace = true }
soil-basic-authorship = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
substrate-test-runtime-transaction-pool = { workspace = true }
tokio = { features = ["macros", "rt-multi-thread"], workspace = true, default-features = true }
