[package]
name = "soil-mmr-primitives"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Merkle Mountain Range primitives."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
log = { workspace = true }
mmr-lib = { workspace = true, default-features = false }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
soil-api = { workspace = true }
soil-core = { workspace = true }
soil-debug-derive = { workspace = true }
soil-runtime = { workspace = true }
thiserror = { optional = true, workspace = true }

# Client-side dependencies (former mmr-gadget)
futures = { optional = true, workspace = true }
sc-client-api = { optional = true, workspace = true, default-features = true }
soil-blockchain = { optional = true, workspace = true, default-features = true }
soil-consensus = { optional = true, workspace = true, default-features = true }
soil-offchain = { optional = true, workspace = true, default-features = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
soil-block-builder = { workspace = true, default-features = true }
soil-tracing = { workspace = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"dep:thiserror",
	"futures",
	"log/std",
	"mmr-lib/std",
	"sc-client-api",
	"scale-info/std",
	"serde/std",
	"soil-api/std",
	"soil-blockchain",
	"soil-consensus",
	"soil-core/std",
	"soil-debug-derive/std",
	"soil-offchain",
	"soil-runtime/std",
]

# Serde support without relying on std features.
serde = ["dep:serde", "scale-info/serde", "soil-core/serde", "soil-runtime/serde"]
