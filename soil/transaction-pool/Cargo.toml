[package]
name = "soil-transaction-pool"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Transaction pool runtime facing API."
documentation = "https://docs.rs/sp-transaction-pool"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
soil-api = { workspace = true }
soil-runtime = { workspace = true }

# Client-side dependencies (former sc-transaction-pool-api)
async-trait = { optional = true, workspace = true }
codec = { optional = true, workspace = true, default-features = true }
futures = { optional = true, workspace = true }
indexmap = { optional = true, workspace = true }
log = { optional = true, workspace = true, default-features = true }
serde = { optional = true, features = ["derive"], workspace = true, default-features = true }
soil-blockchain = { optional = true, workspace = true, default-features = true }
soil-core = { optional = true, workspace = true }
strum = { optional = true, workspace = true, features = ["derive"] }
thiserror = { optional = true, workspace = true }

[dev-dependencies]
serde_json = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"async-trait",
	"codec",
	"futures",
	"indexmap",
	"log",
	"serde",
	"soil-api/std",
	"soil-blockchain",
	"soil-core",
	"soil-runtime/std",
	"strum",
	"thiserror",
]
