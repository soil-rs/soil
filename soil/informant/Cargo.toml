[package]
name = "soil-informant"
version = "0.33.0"
authors.workspace = true
description = "Substrate informant."
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
console = { workspace = true }
futures = { workspace = true }
futures-timer = { workspace = true }
log = { workspace = true, default-features = true }
soil-client-api = { workspace = true, default-features = true }
soil-network = { workspace = true, default-features = true }
soil-network-sync = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }

[features]
default = ["std"]
std = []
