[package]
name = "soil-rpc-spec-v2"
version = "0.34.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Substrate RPC interface v2."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
jsonrpsee = { workspace = true, features = ["client-core", "macros", "server-core"], optional = true}
# Internal chain structures for "chain_spec".
soil-chain-spec = { workspace = true, default-features = true, optional = true}
# Pool for submitting extrinsics required by "transaction"
array-bytes = { workspace = true, default-features = true, optional = true}
codec = { workspace = true, default-features = true, optional = true}
futures = { workspace = true, optional = true}
futures-util = { workspace = true, optional = true}
hex = { workspace = true, default-features = true, optional = true}
itertools = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
rand = { workspace = true, default-features = true, optional = true}
soil-client-api = { workspace = true, default-features = true, optional = true}
sc-rpc = { workspace = true, default-features = true, optional = true}
soil-transaction-pool-api = { workspace = true, default-features = true, optional = true}
schnellru = { workspace = true, optional = true}
serde = { workspace = true, default-features = true, optional = true}
soil-api = { workspace = true, default-features = true, optional = true}
soil-blockchain = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}
soil-rpc = { workspace = true, default-features = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
soil-version = { workspace = true, default-features = true, optional = true}
thiserror = { workspace = true, optional = true}
tokio = { features = ["sync"], workspace = true, default-features = true, optional = true}
tokio-stream = { features = ["sync"], workspace = true, optional = true}

[features]
default = ["std"]
std = [
	"array-bytes",
	"codec",
	"futures",
	"futures-util",
	"hex",
	"itertools",
	"jsonrpsee",
	"log",
	"parking_lot",
	"prometheus-endpoint",
	"rand",
	"sc-rpc",
	"schnellru",
	"serde",
	"soil-api",
	"soil-blockchain",
	"soil-chain-spec",
	"soil-client-api",
	"soil-core",
	"soil-rpc",
	"soil-runtime",
	"soil-transaction-pool-api",
	"soil-version",
	"thiserror",
	"tokio",
	"tokio-stream",
	"soil-api/std",
	"soil-chain-spec/std",
	"soil-client-api/std",
	"soil-core/std",
	"soil-runtime/std",
	"soil-transaction-pool-api/std",
	"soil-version/std",
]

[dev-dependencies]
assert_matches = { workspace = true }
async-trait = { workspace = true }
jsonrpsee = { workspace = true, features = ["server", "ws-client"] }
pretty_assertions = { workspace = true }
sc-block-builder = { workspace = true, default-features = true }
sc-rpc = { workspace = true, default-features = true, features = ["test-helpers"] }
soil-service = { workspace = true, default-features = true }
sc-transaction-pool = { workspace = true, default-features = true }
soil-utils = { workspace = true, default-features = true }
serde_json = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-externalities = { workspace = true, default-features = true }
soil-maybe-compressed-blob = { workspace = true, default-features = true }
substrate-test-runtime = { workspace = true }
substrate-test-runtime-client = { workspace = true }
substrate-test-runtime-transaction-pool = { workspace = true }
tokio = { features = ["macros"], workspace = true, default-features = true }
