[package]
name = "soil-consensus-beefy"
version = "13.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Primitives for BEEFY protocol."

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { optional = true, workspace = true, default-features = true }
async-channel = { optional = true, workspace = true }
async-trait = { optional = true, workspace = true }
codec = { features = ["derive"], workspace = true }
futures = { optional = true, workspace = true }
log = { optional = true, workspace = true, default-features = true }
parking_lot = { optional = true, workspace = true, default-features = true }
prometheus-endpoint = { optional = true, workspace = true, default-features = true }
sc-client-api = { optional = true, workspace = true, default-features = true }
sc-consensus = { optional = true, workspace = true, default-features = true }
sc-network = { optional = true, workspace = true, default-features = true }
sc-network-gossip = { optional = true, workspace = true, default-features = true }
sc-network-sync = { optional = true, workspace = true, default-features = true }
sc-network-types = { optional = true, workspace = true, default-features = true }
sc-utils = { optional = true, workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { optional = true, features = ["alloc", "derive"], workspace = true }
soil-api = { workspace = true }
soil-application-crypto = { workspace = true }
soil-arithmetic = { optional = true, workspace = true, default-features = true }
soil-blockchain = { optional = true, workspace = true, default-features = true }
soil-consensus = { optional = true, workspace = true, default-features = true }
soil-core = { workspace = true }
soil-crypto-hashing = { workspace = true }
soil-io = { workspace = true }
soil-keystore = { workspace = true }
soil-mmr-primitives = { workspace = true }
soil-runtime = { workspace = true }
soil-weights = { workspace = true }
strum = { features = ["derive"], workspace = true }
thiserror = { optional = true, workspace = true }
tokio = { optional = true, workspace = true, default-features = true }
wasm-timer = { optional = true, workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
sc-network-test = { workspace = true }
serde = { workspace = true, default-features = true }
soil-block-builder = { workspace = true, default-features = true }
soil-mmr-primitives = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }
w3f-bls = { features = ["std"], workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"array-bytes",
	"async-channel",
	"async-trait",
	"codec/std",
	"futures",
	"log",
	"parking_lot",
	"prometheus-endpoint",
	"sc-client-api",
	"sc-consensus",
	"sc-network",
	"sc-network-gossip",
	"sc-network-sync",
	"sc-network-types",
	"sc-utils",
	"scale-info/std",
	"serde/std",
	"soil-api/std",
	"soil-application-crypto/std",
	"soil-arithmetic",
	"soil-blockchain",
	"soil-consensus",
	"soil-core/std",
	"soil-crypto-hashing/std",
	"soil-io/std",
	"soil-keystore/std",
	"soil-mmr-primitives/std",
	"soil-runtime/std",
	"soil-weights/std",
	"strum/std",
	"thiserror",
	"tokio",
	"wasm-timer",
]

# Serde support without relying on std features.
serde = [
	"dep:serde",
	"scale-info/serde",
	"soil-application-crypto/serde",
	"soil-core/serde",
	"soil-runtime/serde",
]

# This feature adds BLS crypto primitives. It should not be used in production since
# the BLS implementation and interface may still be subject to significant change.
bls-experimental = [
	"soil-application-crypto/bls-experimental",
	"soil-core/bls-experimental",
]
