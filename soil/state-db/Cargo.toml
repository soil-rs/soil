[package]
name = "soil-state-db"
version = "0.30.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "State database maintenance. Handles canonicalization and pruning in the database."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true, default-features = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
parking_lot = { workspace = true, default-features = true, optional = true}
soil-core = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"codec",
	"log",
	"parking_lot",
	"soil-core",
	"soil-core/std",
]
