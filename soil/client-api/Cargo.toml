[package]
name = "soil-client-api"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
homepage.workspace = true
repository.workspace = true
description = "Substrate client interfaces."
documentation = "https://docs.rs/soil-client-api"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
fnv = { workspace = true }
futures = { workspace = true }
log = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
prometheus-endpoint = { workspace = true, default-features = true }
soil-executor = { workspace = true, default-features = true }
soil-transaction-pool-api = { workspace = true, default-features = true }
soil-utils = { workspace = true, default-features = true }
soil-api = { workspace = true, default-features = true }
soil-blockchain = { workspace = true, default-features = true }
soil-consensus = { workspace = true, default-features = true }
soil-core = { workspace = true }
soil-database = { workspace = true, default-features = true }
soil-externalities = { workspace = true, default-features = true }
soil-runtime = { workspace = true }
soil-state-machine = { workspace = true, default-features = true }
soil-storage = { workspace = true, default-features = true }
soil-trie = { workspace = true, default-features = true }

[dev-dependencies]
substrate-test-runtime = { workspace = true }
