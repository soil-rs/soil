[package]
description = "Gossiping for the Substrate network protocol"
name = "soil-network-gossip"
version = "0.34.0"
license = "GPL-3.0-or-later WITH Classpath-exception-2.0"
authors.workspace = true
edition.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/soil-network-gossip"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
ahash = { workspace = true, optional = true}
futures = { workspace = true, optional = true}
futures-timer = { workspace = true, optional = true}
log = { workspace = true, default-features = true, optional = true}
prometheus-endpoint = { workspace = true, default-features = true, optional = true}
soil-network = { workspace = true, default-features = true, optional = true}
soil-network-common = { workspace = true, default-features = true, optional = true}
soil-network-sync = { workspace = true, default-features = true, optional = true}
soil-network-types = { workspace = true, default-features = true, optional = true}
schnellru = { workspace = true, optional = true}
soil-runtime = { workspace = true, default-features = true, optional = true}
tracing = { workspace = true, default-features = true, optional = true}

[features]
default = ["std"]
std = [
	"ahash",
	"futures",
	"futures-timer",
	"log",
	"prometheus-endpoint",
	"schnellru",
	"soil-network",
	"soil-network-common",
	"soil-network-sync",
	"soil-network-types",
	"soil-runtime",
	"tracing",
	"soil-network/std",
	"soil-network-common/std",
	"soil-network-sync/std",
	"soil-network-types/std",
	"soil-runtime/std",
]

[dev-dependencies]
async-trait = { workspace = true }
codec = { features = ["derive"], workspace = true, default-features = true }
quickcheck = { workspace = true }
substrate-test-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }
