[package]
name = "soil-keystore"
version = "0.34.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Keystore primitives."
documentation = "https://docs.rs/sp-core"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { optional = true, workspace = true, default-features = true }
codec = { features = ["derive"], workspace = true }
parking_lot = { optional = true, workspace = true }
serde_json = { optional = true, workspace = true, default-features = true }
soil-core = { workspace = true }
soil-externalities = { workspace = true }
thiserror = { optional = true, workspace = true }

[dev-dependencies]
soil-application-crypto = { workspace = true, default-features = true }
tempfile = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"dep:array-bytes",
	"dep:parking_lot",
	"dep:serde_json",
	"dep:thiserror",
	"soil-core/std",
	"soil-externalities/std",
]

# This feature adds BLS crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bls-experimental = ["soil-core/bls-experimental"]

# This feature adds Bandersnatch crypto primitives.
# It should not be used in production since the implementation and interface may still
# be subject to significant changes.
bandersnatch-experimental = ["soil-core/bandersnatch-experimental"]
