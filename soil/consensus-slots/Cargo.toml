[package]
name = "soil-consensus-slots"
version = "0.32.0"
authors.workspace = true
description = "Primitives for slots-based consensus"
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
async-trait = { optional = true, workspace = true }
codec = { features = ["derive", "max-encoded-len"], workspace = true }
futures = { optional = true, workspace = true }
futures-timer = { optional = true, workspace = true }
log = { optional = true, workspace = true, default-features = true }
sc-client-api = { optional = true, workspace = true, default-features = true }
sc-consensus = { optional = true, workspace = true, default-features = true }
sc-telemetry = { optional = true, workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["alloc", "derive"], optional = true, workspace = true }
soil-arithmetic = { optional = true, workspace = true, default-features = true }
soil-blockchain = { optional = true, workspace = true, default-features = true }
soil-consensus = { optional = true, workspace = true, default-features = true }
soil-core = { optional = true, workspace = true, default-features = true }
soil-inherents = { optional = true, workspace = true, default-features = true }
soil-runtime = { optional = true, workspace = true, default-features = true }
soil-state-machine = { optional = true, workspace = true, default-features = true }
soil-timestamp = { workspace = true }
soil-trie = { optional = true, workspace = true, default-features = true }

[dev-dependencies]
substrate-test-runtime-client = { workspace = true }

[features]
default = ["std"]
std = [
	"async-trait",
	"codec/std",
	"futures",
	"futures-timer",
	"log",
	"sc-client-api",
	"sc-consensus",
	"sc-telemetry",
	"scale-info/std",
	"serde/std",
	"soil-arithmetic",
	"soil-blockchain",
	"soil-consensus",
	"soil-core",
	"soil-inherents",
	"soil-runtime",
	"soil-state-machine",
	"soil-timestamp/std",
	"soil-trie",
]

# Serde support without relying on std features.
serde = ["dep:serde", "scale-info/serde"]
