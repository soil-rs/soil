[package]
description = "Substrate mixnet types and runtime interface"
name = "soil-mixnet"
version = "0.4.0"
license = "Apache-2.0"
authors = ["Parity Technologies <admin@parity.io>"]
edition.workspace = true
homepage.workspace = true
repository = "https://github.com/paritytech/substrate/"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
array-bytes = { optional = true, workspace = true }
arrayvec = { optional = true, workspace = true }
blake2 = { optional = true, workspace = true }
bytes = { optional = true, workspace = true }
codec = { features = ["derive"], workspace = true }
futures = { optional = true, workspace = true }
futures-timer = { optional = true, workspace = true }
log = { optional = true, workspace = true }
mixnet = { optional = true, workspace = true }
parking_lot = { optional = true, workspace = true }
sc-client-api = { optional = true, workspace = true }
sc-network = { optional = true, workspace = true }
sc-network-types = { optional = true, workspace = true }
sc-transaction-pool-api = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-application-crypto = { workspace = true }
soil-consensus = { optional = true, workspace = true }
soil-core = { optional = true, workspace = true }
soil-keystore = { optional = true, workspace = true }
soil-runtime = { optional = true, workspace = true }
thiserror = { optional = true, workspace = true }

[features]
default = ["std"]
std = [
	"array-bytes",
	"arrayvec",
	"blake2",
	"bytes",
	"codec/std",
	"futures",
	"futures-timer",
	"log",
	"mixnet",
	"parking_lot",
	"sc-client-api",
	"sc-network",
	"sc-network-types",
	"sc-transaction-pool-api",
	"scale-info/std",
	"soil-api/std",
	"soil-application-crypto/std",
	"soil-consensus",
	"soil-core",
	"soil-keystore",
	"soil-runtime",
	"thiserror",
]
