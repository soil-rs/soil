[package]
name = "soil-block-builder"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "The block builder runtime api."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { optional = true, features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-blockchain = { optional = true, workspace = true }
soil-core = { optional = true, workspace = true }
soil-externalities = { optional = true, workspace = true }
soil-inherents = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
soil-state-machine = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }

[features]
default = ["std"]
std = [
	"codec",
	"soil-api/std",
	"soil-blockchain",
	"soil-core",
	"soil-externalities",
	"soil-inherents/std",
	"soil-runtime/std",
]
