[package]
name = "substrate-frame-rpc-system"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME's system exposed over Substrate RPC"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
soil-client = { workspace = true, default-features = true }
codec = { workspace = true, default-features = true }
docify = { workspace = true }
topsoil-system-rpc-runtime-api = { workspace = true, default-features = true }
futures = { workspace = true }
jsonrpsee = { features = ["client-core", "macros", "server-core"], workspace = true }
log = { workspace = true, default-features = true }
soil-rpc = { workspace = true, default-features = true }
subsoil = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
soil-txpool = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }
soil-test-node-runtime-client = { workspace = true }
tokio = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"subsoil/std",
]
