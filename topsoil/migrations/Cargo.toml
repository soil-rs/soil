[package]
name = "topsoil-migrations"
version = "1.0.0"
description = "FRAME pallet to execute multi-block migrations."
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
docify = { workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true }

topsoil = { workspace = true, features = ["runtime"] }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
topsoil-executive = { workspace = true, default-features = true }
soil-tracing = { features = ["std"], workspace = true, default-features = true }

pretty_assertions = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"topsoil/std",
	"log/std",
	"scale-info/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
]

runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]

try-runtime = [
	"topsoil-executive/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil/try-runtime",
	"soil-runtime/try-runtime",
]
