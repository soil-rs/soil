[package]
name = "topsoil-election-solution-type-fuzzer"
version = "2.0.0-alpha.5"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Fuzzer for phragmén solution type implementation."
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bin]]
name = "compact"
path = "src/compact.rs"

[dependencies]
honggfuzz = { workspace = true }

codec = { features = ["derive"], workspace = true }
topsoil-election-provider-solution-type = { workspace = true, default-features = true }
topsoil-election-provider-support = { workspace = true, default-features = true }
soil-arithmetic = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }
# used by generate_solution_type:
topsoil-support = { workspace = true, default-features = true }
