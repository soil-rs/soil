[package]
name = "topsoil-system-benchmarking"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME System benchmarking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-benchmarking = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-core = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
soil-externalities = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }
soil-version = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"scale-info/std",
	"soil-core/std",
	"soil-runtime/std",
]

runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
