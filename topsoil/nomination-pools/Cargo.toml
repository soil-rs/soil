[package]
name = "topsoil-nomination-pools"
version = "25.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME nomination pools pallet"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# parity
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

# FRAME
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }
soil-staking = { workspace = true }

# Optional: use for testing and/or fuzzing
topsoil-balances = { optional = true, workspace = true }
soil-tracing = { optional = true, workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }

[features]
default = ["std"]
fuzzing = ["topsoil-balances", "soil-tracing"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances?/std",
	"scale-info/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-staking/std",
	"soil-tracing?/std",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"topsoil-balances?/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances?/try-runtime",
	"soil-runtime/try-runtime",
]
