[package]
name = "topsoil-nomination-pools-runtime-api"
version = "23.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Runtime API for nomination-pools FRAME pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-nomination-pools = { workspace = true }
soil-api = { workspace = true }

[features]
default = ["std"]
std = ["codec/std", "topsoil-nomination-pools/std", "soil-api/std"]
