[package]
name = "pallet-statement"
version = "10.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for statement store"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-api = { workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }
soil-statement-store = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"scale-info/std",
	"soil-api/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-statement-store/std",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"soil-runtime/try-runtime",
]
