[package]
name = "topsoil-dev-mode"
version = "10.0.0"
authors.workspace = true
edition.workspace = true
license = "MIT-0"
homepage.workspace = true
repository.workspace = true
description = "FRAME example pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
topsoil-balances = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
soil-core = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"topsoil-balances/std",
	"scale-info/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"topsoil-balances/try-runtime",
	"soil-runtime/try-runtime",
]
