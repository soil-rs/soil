[package]
name = "topsoil-example-view-functions"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Pallet to demonstrate the usage of view functions to query pallet state"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { default-features = false, workspace = true }
frame-metadata = { features = ["current"], workspace = true }
log = { workspace = true }
scale-info = { default-features = false, features = ["derive"], workspace = true }

topsoil-support = { default-features = false, workspace = true }
topsoil-system = { default-features = false, workspace = true }

soil-core = { default-features = false, workspace = true }
soil-io = { default-features = false, workspace = true }
soil-metadata-ir = { default-features = false, workspace = true }
soil-runtime = { default-features = false, workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"frame-metadata/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"scale-info/std",
	"soil-core/std",
	"soil-io/std",
	"soil-metadata-ir/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"soil-runtime/try-runtime",
]
