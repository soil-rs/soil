[package]
name = "pallet-dummy-dim"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "Dummy DIM Pallet"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, features = ["derive"] }
frame-benchmarking = { workspace = true, optional = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
log = { workspace = true }
scale-info = { workspace = true, features = ["derive"] }
soil-api = { workspace = true }
soil-arithmetic = { workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
pallet-people = { workspace = true }
verifiable = { workspace = true, features = ["small-ring"] }

[features]
default = ["std"]
std = [
	"codec/std",
	"frame-benchmarking?/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"pallet-people/std",
	"scale-info/std",
	"soil-api/std",
	"soil-arithmetic/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
	"verifiable/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-people/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-people/try-runtime",
	"soil-runtime/try-runtime",
]
