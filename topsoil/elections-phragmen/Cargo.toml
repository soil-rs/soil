[package]
name = "topsoil-elections-phragmen"
version = "29.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet based on seq-Phragmén election method."
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
frame-benchmarking = { optional = true, workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-npos-elections = { workspace = true }
soil-runtime = { workspace = true }
soil-staking = { workspace = true }

[dev-dependencies]
pallet-balances = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }
substrate-test-utils = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"frame-benchmarking?/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"pallet-balances/std",
	"scale-info/std",
	"soil-core/std",
	"soil-io/std",
	"soil-npos-elections/std",
	"soil-runtime/std",
	"soil-staking/std",
	"soil-tracing/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-balances/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-balances/try-runtime",
	"soil-runtime/try-runtime",
]
