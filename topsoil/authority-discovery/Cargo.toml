[package]
name = "topsoil-authority-discovery"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for authority discovery"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
pallet-session = { features = ["historical"], workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-application-crypto = { workspace = true }
soil-authority-discovery = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
pallet-balances = { workspace = true }
soil-core = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"frame-support/std",
	"frame-system/std",
	"pallet-balances/std",
	"pallet-session/std",
	"scale-info/std",
	"soil-application-crypto/std",
	"soil-authority-discovery/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-balances/try-runtime",
	"pallet-session/try-runtime",
	"soil-runtime/try-runtime",
]
