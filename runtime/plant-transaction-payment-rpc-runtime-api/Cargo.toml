[package]
name = "plant-transaction-payment-rpc-runtime-api"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "RPC runtime API for transaction payment FRAME pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
plant-transaction-payment = { workspace = true }
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"plant-transaction-payment/std",
	"subsoil/std"]
