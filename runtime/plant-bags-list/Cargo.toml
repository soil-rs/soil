[package]
name = "plant-bags-list"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet bags list"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# parity
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

# primitives

# FRAME
plant-election-provider = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }

# third party
aquamarine = { workspace = true }
docify = { workspace = true }
log = { workspace = true }

# Optional imports for benchmarking
topsoil-benchmarking = { optional = true, workspace = true }
plant-balances = { optional = true, workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
topsoil-benchmarking = { workspace = true, default-features = true }
plant-election-provider = { workspace = true, default-features = true }
plant-balances = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"plant-election-provider/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"plant-balances?/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"plant-election-provider/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
fuzz = [
	"plant-election-provider/fuzz",
	"plant-balances",
]
try-runtime = [
	"plant-election-provider/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"plant-balances?/try-runtime",
	"subsoil/try-runtime",
]
