[package]
name = "plant-session"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME sessions pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
impl-trait-for-tuples = { workspace = true }
log = { workspace = true }
plant-balances = { workspace = true }
plant-timestamp = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
subsoil = { features = ["serde"], workspace = true }

[features]
default = ["historical", "std"]
historical = []
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"plant-balances/std",
	"plant-timestamp/std",
	"scale-info/std",
	"subsoil/std",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"plant-balances/try-runtime",
	"plant-timestamp/try-runtime",
	"subsoil/try-runtime",
]
runtime-benchmarks = [
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-timestamp/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
