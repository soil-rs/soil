[package]
name = "plant-grandpa"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for GRANDPA finality gadget"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
plant-authorship = { workspace = true }
plant-session = { workspace = true }
scale-info = { features = ["derive", "serde"], workspace = true }
subsoil = { features = ["serde"], workspace = true }

[dev-dependencies]
finality-grandpa = { features = ["derive-codec"], workspace = true, default-features = true }
topsoil-benchmarking = { workspace = true, default-features = true }
plant-election-provider = { workspace = true, default-features = true }
plant-balances = { workspace = true, default-features = true }
plant-offences = { workspace = true, default-features = true }
plant-staking = { workspace = true, default-features = true }
plant-staking-macros = { workspace = true, default-features = true }
plant-timestamp = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"plant-election-provider/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"plant-authorship/std",
	"plant-balances/std",
	"plant-offences/std",
	"plant-session/std",
	"plant-staking/std",
	"plant-timestamp/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"plant-election-provider/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-offences/runtime-benchmarks",
	"plant-session/runtime-benchmarks",
	"plant-staking/runtime-benchmarks",
	"plant-timestamp/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"plant-election-provider/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"plant-authorship/try-runtime",
	"plant-balances/try-runtime",
	"plant-offences/try-runtime",
	"plant-session/try-runtime",
	"plant-staking/try-runtime",
	"plant-timestamp/try-runtime",
	"subsoil/try-runtime",
]
