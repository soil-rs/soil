[package]
name = "plant-election-provider"
version = "0.2.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "election provider supporting traits"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
plant-election-provider-macros = { workspace = true, default-features = true }
topsoil-benchmarking = { optional = true, workspace = true }
topsoil-core = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }


[dev-dependencies]
rand = { features = ["small_rng"], workspace = true, default-features = true }

[features]
default = ["std"]
fuzz = ["default"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-core/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-core/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"topsoil-core/try-runtime",
	"subsoil/try-runtime",
]
