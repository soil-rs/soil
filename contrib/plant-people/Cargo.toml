[package]
name = "plant-people"
version = "0.0.0-dev"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Personhood-tracking pallet"
readme = "README.md"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, features = ["derive"] }
topsoil-benchmarking = { workspace = true, optional = true }
topsoil-core = { workspace = true }
log = { workspace = true }
scale-info = { workspace = true, features = ["derive"] }
subsoil = { workspace = true }
verifiable = { workspace = true, features = ["small-ring"] }


[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-core/std",
	"log/std",
	"scale-info/std",
	"subsoil/std",
	"verifiable/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-core/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
	"verifiable/no-std-prover",
]
try-runtime = [
	"topsoil-core/try-runtime",
	"subsoil/try-runtime",
]
