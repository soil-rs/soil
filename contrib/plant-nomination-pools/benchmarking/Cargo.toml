[package]
name = "plant-nomination-pools-benchmarking"
version = "26.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME nomination pools pallet benchmarking"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
# parity
codec = { features = ["derive"], workspace = true }
scale-info = { features = ["derive"], workspace = true }

# FRAME
topsoil-benchmarking = { workspace = true }
plant-election-provider-support = { workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
plant-bags-list = { workspace = true }
plant-delegated-staking = { workspace = true }
plant-nomination-pools = { workspace = true }
plant-staking = { workspace = true }

# Substrate Primitives
soil-staking = { workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true }
plant-staking-reward-curve = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking/std",
	"plant-election-provider-support/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"plant-bags-list/std",
	"topsoil-balances/std",
	"plant-delegated-staking/std",
	"plant-nomination-pools/std",
	"plant-staking/std",
	"topsoil-timestamp/std",
	"scale-info/std",
	"subsoil/std",
	"soil-staking/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"plant-election-provider-support/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"plant-bags-list/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"plant-delegated-staking/runtime-benchmarks",
	"plant-nomination-pools/runtime-benchmarks",
	"plant-staking/runtime-benchmarks",
	"topsoil-timestamp/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
	"soil-staking/runtime-benchmarks",
]
