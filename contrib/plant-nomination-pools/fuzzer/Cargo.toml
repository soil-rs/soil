[package]
name = "plant-nomination-pools-fuzzer"
version = "0.0.0-dev"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Fuzzer for fixed point arithmetic primitives."
documentation = "https://docs.rs/sp-arithmetic-fuzzer"
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[[bin]]
name = "call"
path = "src/call.rs"

[dependencies]
honggfuzz = { workspace = true }

plant-nomination-pools = { features = ["fuzzing"], workspace = true, default-features = true }

topsoil-core = { workspace = true, default-features = true }

subsoil = { workspace = true, default-features = true }

log = { workspace = true, default-features = true }
rand = { features = ["small_rng"], workspace = true, default-features = true }
