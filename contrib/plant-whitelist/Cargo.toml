[package]
name = "plant-whitelist"
version = "0.0.0-dev"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for whitelisting calls, and dispatching from a specific origin"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive", "max-encoded-len"], workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
plant-balances = { workspace = true, default-features = true }
plant-preimage = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-preimage/runtime-benchmarks",
]
try-runtime = [
	"topsoil/try-runtime",
	"plant-balances/try-runtime",
	"plant-preimage/try-runtime",
]
