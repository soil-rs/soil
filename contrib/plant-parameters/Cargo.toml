[package]
name = "plant-parameters"
description = "Pallet to store and configure parameters."
repository.workspace = true
license.workspace = true
version = "0.0.0-dev"
publish = false
authors = ["Acala Developers", "Parity Technologies <admin@parity.io>"]
edition.workspace = true

[dependencies]
codec = { features = ["max-encoded-len"], workspace = true }
docify = { workspace = true }
paste = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
serde = { features = ["derive"], optional = true, workspace = true, default-features = true }

topsoil-benchmarking = { optional = true, workspace = true }
topsoil-core = { features = ["experimental"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
plant-balances = { workspace = true, default-features = true }
plant-example-basic = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-core/std",
	"scale-info/std",
	"serde",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-core/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-example-basic/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"topsoil-core/try-runtime",
	"plant-balances/try-runtime",
	"plant-example-basic/try-runtime",
	"subsoil/try-runtime",
]
