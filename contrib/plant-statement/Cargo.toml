[package]
name = "plant-statement"
version = "0.0.0-dev"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME pallet for statement store"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }
soil-statement-store = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"scale-info/std",
	"subsoil/std",
	"soil-statement-store/std"]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"subsoil/try-runtime"]
