[package]
name = "plant-election-provider-e2e-test"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME election provider multi phase pallet tests with staking pallet, bags-list and session pallets"
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dev-dependencies]
codec = { features = ["derive"], workspace = true, default-features = true }
log = { workspace = true }
parking_lot = { workspace = true, default-features = true }
scale-info = { features = ["derive"], workspace = true, default-features = true }

soil-staking = { workspace = true, default-features = true }
subsoil = { workspace = true, default-features = true }

plant-election-provider-support = { workspace = true, default-features = true }
topsoil-support = { workspace = true, default-features = true }
topsoil-system = { workspace = true, default-features = true }

plant-bags-list = { workspace = true, default-features = true }
topsoil-balances = { workspace = true, default-features = true }
plant-delegated-staking = { workspace = true, default-features = true }
plant-election-provider-multi-phase = { workspace = true, default-features = true }
plant-nomination-pools = { workspace = true, default-features = true }
topsoil-session = { workspace = true, default-features = true }
plant-staking = { workspace = true, default-features = true }
topsoil-timestamp = { workspace = true, default-features = true }

[features]
try-runtime = [
	"plant-election-provider-support/try-runtime",
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"plant-bags-list/try-runtime",
	"topsoil-balances/try-runtime",
	"plant-delegated-staking/try-runtime",
	"plant-election-provider-multi-phase/try-runtime",
	"plant-nomination-pools/try-runtime",
	"topsoil-session/try-runtime",
	"plant-staking/try-runtime",
	"topsoil-timestamp/try-runtime",
	"subsoil/try-runtime",
]
