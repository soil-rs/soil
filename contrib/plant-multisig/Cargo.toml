[package]
name = "plant-multisig"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME multi-signature dispatch pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
scale-info = { features = ["derive"], workspace = true }

# third party
log = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil/std",
	"log/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
]
try-runtime = [
	"topsoil/try-runtime",
	"topsoil-balances/try-runtime",
]
