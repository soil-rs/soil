[package]
name = "plant-recovery"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME account recovery pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
scale-info = { features = ["derive"], workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }

[features]
default = ["std"]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
]
std = [
	"codec/std",
	"topsoil/std",
	"topsoil-balances/std",
	"scale-info/std",
	"subsoil/std",
]
try-runtime = [
	"topsoil/try-runtime",
	"topsoil-balances/try-runtime",
]
