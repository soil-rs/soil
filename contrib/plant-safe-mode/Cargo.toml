[package]
name = "plant-safe-mode"
version = "9.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME safe-mode pallet"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
docify = { workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
topsoil-balances = { optional = true, workspace = true }
plant-proxy = { optional = true, workspace = true }
topsoil-utility = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
topsoil-balances = { workspace = true, default-features = true }
plant-proxy = { workspace = true, default-features = true }
topsoil-utility = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil/std",
	"topsoil-balances?/std",
	"plant-proxy?/std",
	"topsoil-utility?/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"topsoil-balances/runtime-benchmarks",
	"plant-proxy/runtime-benchmarks",
	"topsoil-utility/runtime-benchmarks",
]
try-runtime = [
	"topsoil/try-runtime",
	"topsoil-balances?/try-runtime",
	"plant-proxy?/try-runtime",
	"topsoil-utility?/try-runtime",
]
