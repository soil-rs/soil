[package]
name = "plant-safe-mode"
version = "0.0.0-dev"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME safe-mode pallet"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
docify = { workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
plant-balances = { optional = true, workspace = true }
plant-proxy = { optional = true, workspace = true }
plant-utility = { optional = true, workspace = true }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
plant-balances = { workspace = true, default-features = true }
plant-proxy = { workspace = true, default-features = true }
plant-utility = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil/std",
	"plant-balances?/std",
	"plant-proxy?/std",
	"plant-utility?/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-proxy/runtime-benchmarks",
	"plant-utility/runtime-benchmarks",
]
try-runtime = [
	"topsoil/try-runtime",
	"plant-balances?/try-runtime",
	"plant-proxy?/try-runtime",
	"plant-utility?/try-runtime",
]
