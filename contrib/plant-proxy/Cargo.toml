[package]
name = "plant-proxy"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME proxying pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["max-encoded-len"], workspace = true }
topsoil = { workspace = true, features = ["runtime"] }
scale-info = { features = ["derive"], workspace = true }

[dev-dependencies]
plant-balances = { workspace = true, default-features = true }
plant-utility = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil/std",
	"scale-info/std",
]
runtime-benchmarks = [
	"topsoil/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"plant-utility/runtime-benchmarks",
]
try-runtime = [
	"topsoil/try-runtime",
	"plant-balances/try-runtime",
	"plant-utility/try-runtime",
]
