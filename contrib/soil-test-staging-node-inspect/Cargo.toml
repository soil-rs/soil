[package]
name = "soil-test-staging-node-inspect"
version = "0.0.0-dev"
publish = false
authors.workspace = true
description = "Substrate node block inspection tool."
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
soil-client = { workspace = true, default-features = true }
clap = { features = ["derive"], workspace = true }
codec = { workspace = true, default-features = true }
soil-cli = { workspace = true }
soil-service = { workspace = true }
subsoil = { workspace = true, default-features = true }
soil-statement-store = { workspace = true, default-features = true }
thiserror = { workspace = true }

[features]
runtime-benchmarks = [
	"soil-service/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
