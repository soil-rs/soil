[package]
name = "soil-test-staging-node-cli-test-utils"
description = "CLI testing utilities"
version = "0.1.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
assert_cmd = { workspace = true }
futures = { workspace = true }
nix = { features = ["signal"], workspace = true }
soil-test-staging-node-cli = { workspace = true }
soil-test-staging-node-primitives = { workspace = true, default-features = true }
regex = { workspace = true }
soil-cli = { workspace = true, default-features = false }
soil-service = { workspace = true, default-features = false }
soil-rpc = { workspace = true, default-features = true }
tokio = { features = ["full"], workspace = true, default-features = true }

[features]
try-runtime = ["soil-test-staging-node-cli/try-runtime"]
