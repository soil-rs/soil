[package]
name = "plant-society"
version = "0.0.0-dev"
publish = false
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "FRAME society pallet"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
log = { workspace = true }
rand_chacha = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

topsoil-benchmarking = { optional = true, workspace = true }
topsoil-core = { workspace = true }
subsoil = { workspace = true }

[dev-dependencies]
topsoil-test-support = { workspace = true }
plant-balances = { workspace = true, default-features = true }
subsoil-crypto-hashing = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-test-support/std",
	"topsoil-core/std",
	"log/std",
	"plant-balances/std",
	"rand_chacha/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking",
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-test-support/runtime-benchmarks",
	"topsoil-core/runtime-benchmarks",
	"plant-balances/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"topsoil-test-support/try-runtime",
	"topsoil-core/try-runtime",
	"plant-balances/try-runtime",
	"subsoil/try-runtime",
]
