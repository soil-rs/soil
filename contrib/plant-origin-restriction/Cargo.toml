[package]
name = "plant-origin-restriction"
version = "1.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Pallet to give some execution allowance for some origins"

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { workspace = true, features = ["derive"] }
topsoil-benchmarking = { workspace = true, optional = true }
topsoil-support = { workspace = true }
topsoil-system = { workspace = true }
log = { workspace = true }
plant-transaction-payment = { workspace = true }
scale-info = { workspace = true, features = ["derive"] }
subsoil = { workspace = true }

[features]
default = ["std"]
std = [
	"codec/std",
	"topsoil-benchmarking?/std",
	"topsoil-support/std",
	"topsoil-system/std",
	"log/std",
	"plant-transaction-payment/std",
	"scale-info/std",
	"subsoil/std",
]
runtime-benchmarks = [
	"topsoil-benchmarking/runtime-benchmarks",
	"topsoil-support/runtime-benchmarks",
	"topsoil-system/runtime-benchmarks",
	"plant-transaction-payment/runtime-benchmarks",
	"subsoil/runtime-benchmarks",
]
try-runtime = [
	"topsoil-support/try-runtime",
	"topsoil-system/try-runtime",
	"plant-transaction-payment/try-runtime",
	"subsoil/try-runtime",
]
