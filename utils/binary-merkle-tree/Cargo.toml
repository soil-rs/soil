[package]
name = "binary-merkle-tree"
version = "13.0.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "A no-std/Substrate compatible library to construct binary merkle tree."
homepage.workspace = true

[lints]
workspace = true

[dependencies]
array-bytes = { optional = true, workspace = true, default-features = true }
codec = { workspace = true, features = ["derive"] }
hash-db = { workspace = true }
log = { optional = true, workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-runtime = { workspace = true, default-features = true }

[features]
debug = ["array-bytes", "log"]
default = ["debug", "std"]
std = [
	"codec/std",
	"hash-db/std",
	"log/std",
	"soil-core/std",
	"soil-runtime/std",
]
