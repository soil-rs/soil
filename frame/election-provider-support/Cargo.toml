[package]
name = "frame-election-provider-support"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "election provider supporting traits"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
frame-election-provider-solution-type = { workspace = true, default-features = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-arithmetic = { workspace = true }
soil-core = { workspace = true }
soil-npos-elections = { workspace = true }
soil-runtime = { workspace = true }
soil-std = { workspace = true }


[dev-dependencies]
rand = { features = ["small_rng"], workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }
soil-npos-elections = { workspace = true, default-features = true }

[features]
default = ["std"]
fuzz = ["default"]
std = [
	"codec/std",
	"frame-support/std",
	"frame-system/std",
	"scale-info/std",
	"soil-arithmetic/std",
	"soil-core/std",
	"soil-io/std",
	"soil-npos-elections/std",
	"soil-runtime/std",
	"soil-std/std",
]
runtime-benchmarks = [
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"soil-runtime/try-runtime",
]
