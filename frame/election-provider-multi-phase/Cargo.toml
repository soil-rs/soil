[package]
name = "pallet-election-provider-multi-phase"
version = "27.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "PALLET two phase election providers"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
codec = { features = ["derive"], workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }

frame-support = { workspace = true }
frame-system = { workspace = true }

frame-election-provider-support = { workspace = true }
soil-arithmetic = { workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
sp-npos-elections = { workspace = true }
soil-runtime = { workspace = true }

# Optional imports for benchmarking
frame-benchmarking = { optional = true, workspace = true }
rand = { features = ["alloc", "small_rng"], optional = true, workspace = true }
strum = { features = ["derive"], optional = true, workspace = true }

# optional for remote testing
hex = { workspace = true, default-features = true, optional = true }
remote-externalities = { workspace = true, default-features = true, optional = true }
tokio = { features = ["macros"], workspace = true, default-features = true, optional = true }

[dev-dependencies]
frame-benchmarking = { workspace = true, default-features = true }
pallet-balances = { workspace = true, default-features = true }
parking_lot = { workspace = true, default-features = true }
rand = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }


[features]
remote-mining = ["hex", "remote-externalities", "tokio"]
default = ["std"]
std = [
	"codec/std",
	"frame-benchmarking?/std",
	"frame-election-provider-support/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"pallet-balances/std",
	"rand/std",
	"scale-info/std",
	"soil-arithmetic/std",
	"soil-core/std",
	"soil-io/std",
	"sp-npos-elections/std",
	"soil-runtime/std",
	"soil-tracing/std",
	"strum/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-election-provider-support/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"pallet-balances/runtime-benchmarks",
	"rand",
	"soil-runtime/runtime-benchmarks",
	"strum",
]
try-runtime = [
	"frame-election-provider-support/try-runtime",
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"pallet-balances/try-runtime",
	"soil-runtime/try-runtime",
]
