[package]
name = "pallet-broker"
version = "0.6.0"
description = "Brokerage tool for managing Polkadot Core scheduling"
authors.workspace = true
homepage.workspace = true
edition.workspace = true
license = "Apache-2.0"
repository.workspace = true

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
bitvec = { workspace = true }
codec = { features = ["derive"], workspace = true }
frame-benchmarking = { optional = true, workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
sp-api = { workspace = true }
soil-arithmetic = { workspace = true }
soil-core = { workspace = true }
soil-runtime = { workspace = true }

[dev-dependencies]
pretty_assertions = { workspace = true }
soil-io = { workspace = true, default-features = true }
soil-tracing = { workspace = true, default-features = true }

[features]
default = ["std"]
std = [
	"bitvec/std",
	"codec/std",
	"frame-benchmarking?/std",
	"frame-support/std",
	"frame-system/std",
	"log/std",
	"scale-info/std",
	"sp-api/std",
	"soil-arithmetic/std",
	"soil-core/std",
	"soil-io/std",
	"soil-runtime/std",
]
runtime-benchmarks = [
	"frame-benchmarking/runtime-benchmarks",
	"frame-support/runtime-benchmarks",
	"frame-system/runtime-benchmarks",
	"soil-runtime/runtime-benchmarks",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"soil-runtime/try-runtime",
]
