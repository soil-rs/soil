[package]
name = "frame-executive"
version = "28.0.0"
authors.workspace = true
edition.workspace = true
license = "Apache-2.0"
homepage.workspace = true
repository.workspace = true
description = "FRAME executives engine"
readme = "README.md"

[lints]
workspace = true

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[dependencies]
aquamarine = { workspace = true }
codec = { features = ["derive"], workspace = true }
frame-support = { workspace = true }
frame-system = { workspace = true }
frame-try-runtime = { optional = true, workspace = true }
log = { workspace = true }
scale-info = { features = ["derive"], workspace = true }
soil-core = { workspace = true }
soil-io = { workspace = true }
soil-runtime = { workspace = true }
soil-tracing = { workspace = true }

[dev-dependencies]
array-bytes = { workspace = true, default-features = true }
pallet-balances = { workspace = true, default-features = true }
pallet-transaction-payment = { workspace = true, default-features = true }
soil-core = { workspace = true, default-features = true }
soil-inherents = { workspace = true, default-features = true }
soil-io = { workspace = true, default-features = true }
soil-version = { workspace = true, default-features = true }
substrate-test-runtime-client = { workspace = true }

[features]
default = ["std"]
with-tracing = ["soil-tracing/with-tracing"]
std = [
	"codec/std",
	"frame-support/experimental",
	"frame-support/std",
	"frame-system/std",
	"frame-try-runtime/std",
	"log/std",
	"pallet-balances/std",
	"pallet-transaction-payment/std",
	"scale-info/std",
	"soil-core/std",
	"soil-inherents/std",
	"soil-io/std",
	"soil-runtime/std",
	"soil-tracing/std",
	"soil-version/std",
]
try-runtime = [
	"frame-support/try-runtime",
	"frame-system/try-runtime",
	"frame-try-runtime/try-runtime",
	"pallet-balances/try-runtime",
	"pallet-transaction-payment/try-runtime",
	"soil-runtime/try-runtime",
]
